name: Build Cairn

# Triggers on any push to main (no path filter — we'll re-narrow once
# this is reliably green) or manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "cairn-src/**"
      - ".github/workflows/build-cairn.yml"
  workflow_dispatch:

permissions:
  contents: write

# Serialize Build Cairn runs per branch. Without this, two runs for
# the same/overlapping SHA can race on the auto-commit `git push` —
# the loser fails the "Commit + push if changed" step with a
# non-fast-forward (a benign but noisy red X; the winner still deploys
# correctly). cancel-in-progress: false QUEUES instead of cancelling,
# so every commit's bundle is built in order and a duplicate run for
# an already-built SHA simply finds no diff and exits green.
concurrency:
  group: build-cairn-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      VITE_FIREBASE_API_KEY: AIzaSyA6NKZNLVBeeLrXcLJSXus5M832AxpI2wk
      VITE_FIREBASE_AUTH_DOMAIN: pebblepath-992b6.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: pebblepath-992b6
      VITE_FIREBASE_STORAGE_BUCKET: pebblepath-992b6.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "497141667291"
      VITE_FIREBASE_APP_ID: "1:497141667291:web:ee84c186db54389d10c3fe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cairn-src/package-lock.json

      - name: Install dependencies
        working-directory: cairn-src
        run: npm ci

      - name: Build
        working-directory: cairn-src
        run: npm run build

      # 2026-05-16 — output renamed /cairn → /portal. The Action no
      # longer touches the legacy /cairn dir; a committed
      # query-preserving redirect lives there instead (Stage B).
      - name: Sync built bundle into /portal
        run: |
          rm -rf portal
          mkdir -p portal
          cp -R cairn-src/dist/. portal/

      - name: Commit + push if changed
        run: |
          git config user.name  "Cairn Build Bot"
          git config user.email "build@pebblepath.ai"
          git add portal

          if git diff --cached --quiet; then
            echo "Portal output unchanged — nothing to commit."
            exit 0
          fi

          git commit -m "Build Cairn @ ${GITHUB_SHA::7}"
          git push
