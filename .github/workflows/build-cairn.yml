name: Build Cairn

# Same-repo CI: source lives in cairn-src/, build output is committed
# back to cairn/ which GitHub Pages serves at pebblepath.ai/cairn/.
# Uses the auto-provided GITHUB_TOKEN (no PAT needed) since we only
# push to this same repo.
on:
  push:
    branches: [main]
    paths:
      - 'cairn-src/**'
      - '.github/workflows/build-cairn.yml'
  workflow_dispatch:

# Newer runs cancel older ones in flight — keeps deploys ordered.
concurrency:
  group: build-cairn
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      # Public Firebase Web SDK config (safe to ship — Firestore Rules + Auth
      # do real access control; these keys identify the project, not authorize it).
      VITE_FIREBASE_API_KEY: AIzaSyA6NKZNLVBeeLrXcLJSXus5M832AxpI2wk
      VITE_FIREBASE_AUTH_DOMAIN: pebblepath-992b6.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: pebblepath-992b6
      VITE_FIREBASE_STORAGE_BUCKET: pebblepath-992b6.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: '497141667291'
      VITE_FIREBASE_APP_ID: '1:497141667291:web:ee84c186db54389d10c3fe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cairn-src/package-lock.json

      - name: Install dependencies
        working-directory: cairn-src
        run: npm ci

      - name: Build
        working-directory: cairn-src
        run: npm run build

      - name: Sync built bundle into /cairn
        run: |
          set -euo pipefail
          rm -rf cairn
          mkdir -p cairn
          cp -R cairn-src/dist/. cairn/

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          git config user.name  "Cairn Build Bot"
          git config user.email "build@pebblepath.ai"
          git add cairn

          if git diff --cached --quiet; then
            echo "::notice::Cairn output unchanged — nothing to commit."
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          git commit -m "Build Cairn @ ${SHORT_SHA}

Auto-generated from cairn-src/ changes."
          git push
          echo "::notice::Deployed Cairn ${SHORT_SHA} → pebblepath.ai/cairn/"
