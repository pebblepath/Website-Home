name: Build Cairn

# Triggers on any push to main (no path filter — we'll re-narrow once
# this is reliably green) or manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "cairn-src/**"
      - ".github/workflows/build-cairn.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      VITE_FIREBASE_API_KEY: AIzaSyA6NKZNLVBeeLrXcLJSXus5M832AxpI2wk
      VITE_FIREBASE_AUTH_DOMAIN: pebblepath-992b6.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: pebblepath-992b6
      VITE_FIREBASE_STORAGE_BUCKET: pebblepath-992b6.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "497141667291"
      VITE_FIREBASE_APP_ID: "1:497141667291:web:ee84c186db54389d10c3fe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cairn-src/package-lock.json

      - name: Install dependencies
        working-directory: cairn-src
        run: npm ci

      - name: Build
        working-directory: cairn-src
        run: npm run build

      - name: Sync built bundle into /cairn
        run: |
          rm -rf cairn
          mkdir -p cairn
          cp -R cairn-src/dist/. cairn/

      - name: Commit + push if changed
        run: |
          git config user.name  "Cairn Build Bot"
          git config user.email "build@pebblepath.ai"
          git add cairn

          if git diff --cached --quiet; then
            echo "Cairn output unchanged — nothing to commit."
            exit 0
          fi

          git commit -m "Build Cairn @ ${GITHUB_SHA::7}"
          git push
