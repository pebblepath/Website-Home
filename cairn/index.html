<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal — pebblepath.ai/portal</title>
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://pebblepath.ai/portal/" />

    <!-- 2026-05-16 — /cairn/ was renamed to /portal/. This is a
         permanent redirect stub kept ONLY so existing bookmarks, the
         already-shipped iOS "Open Cairn" link, and previously-shared
         ?join=/?code= invite links keep working. The Build-Cairn
         Action no longer writes this directory (it builds /portal/),
         so this file is stable. The old built assets that may still
         sit alongside this file are orphaned + inert (this page
         redirects before anything references them). -->

    <!-- OG/Twitter point at /portal/ so any old /cairn/ link shared in
         iMessage/Slack/etc. still unfurls to the right card. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Portal" />
    <meta property="og:title" content="Portal — for every little adventure" />
    <meta property="og:description" content="Private portal for your trips, activities, birthdays and anniversaries — for your whole family." />
    <meta property="og:url" content="https://pebblepath.ai/portal/" />
    <meta property="og:image" content="https://pebblepath.ai/portal/og-card.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Portal — for every little adventure" />
    <meta name="twitter:image" content="https://pebblepath.ai/portal/og-card.svg" />

    <!-- noscript fallback (won't carry the query string — the JS path
         below is the normal case and preserves ?join=/?code= + hash). -->
    <meta http-equiv="refresh" content="0; url=/portal/" />
    <script>
      // Preserve invite params (?join= / ?code=) and any hash so old
      // bookmarks + the shipped iOS link + shared invites resolve to
      // the same place. replace() (not assign) so /cairn/ doesn't
      // linger in history / break the back button.
      location.replace('/portal/' + location.search + location.hash);
    </script>
  </head>
  <body>
    Portal has moved to
    <a href="/portal/">pebblepath.ai/portal</a>. Redirecting…
  </body>
</html>
