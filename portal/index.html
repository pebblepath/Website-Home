         inert. (Supersedes the 2026-05-16 "keep own identity" call.) -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />

      rel="stylesheet"
    />

    <!-- Preload the pre-login Daybreak wallpaper so the browser starts
         fetching it immediately (in parallel with the JS bundle)
         instead of waiting for app-shell JS to compute BASE_URL and
         inject the --pre-login-bg CSS var. Relative href resolves to
         /assets/… in dev and /portal/assets/… in prod — same URL the
         app-shell injects, so it's a cache hit, not a double fetch.
         (Now a 161 KB JPEG, down from an 11.6 MB PNG.) -->
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="assets/pebblepath-daybreak-empty.jpg"
    />

    <!-- Theme bootstrap — apply the saved light/dark choice to <html>
         BEFORE first paint so there's no flash. Toggle lives in
         Settings (Tab 5) and persists in localStorage('portalTheme').
         Default = LIGHT; dark is opt-in (portalTheme === 'dark'). -->
    <script>
      (function () {
        function light() {
          document.documentElement.classList.add('theme-light');
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', '#f2ede3');
        }
        try {
          if (localStorage.getItem('portalTheme') !== 'dark') light();
        } catch (e) {
          /* private mode / storage blocked — still default to light */
          light();
        }
      })();
    </script>
    <script type="module" crossorigin src="/portal/assets/index-dlahGJnB.js"></script>
    <link rel="modulepreload" crossorigin href="/portal/assets/lit-DdSsY2EC.js">

    <link rel="modulepreload" crossorigin href="/portal/assets/firebase-functions-BQqAsnzQ.js">
    <link rel="modulepreload" crossorigin href="/portal/assets/firebase-storage-DV4pfGoB.js">
    <link rel="stylesheet" crossorigin href="/portal/assets/index-DNyq6ISz.css">
