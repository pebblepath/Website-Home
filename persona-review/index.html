wn-household creator, isEligibleOwnHousehold) reaches this branch]."},{"name":"Parent-prompt content (2A claim)","exactCopy":"Are you a parent or caregiver in {familyName}?\\n\\nYou've joined **{familyName}**. If you're a parent or active caregiver of one of these children, ask to be linked to them; an existing parent confirms it. You won't see a child's information until they do.\\n\\n[for each child: {child.name} ›]\\n\\n[No, I'm not a parent or caregiver here]","visibleToPersonas":["P3","P4","P5","P7"],"condition":"family != nil && !cairnChildren.isEmpty && !parentQuestionAnswered (ineligible branch with children)","notes":"{familyName} interpolated; one tappable row per child in cairnChildren. Tapping a child → requestToBeCoParent(childId) + markConnectOnboardingComplete + sets requestSentChildName + parentQuestionAnswered. This is the 2A claim that GRANTS NOTHING until an existing parent confirms — it's the privilege-escalation guardrail. P3 is the persona who taps a child (becomes parent after approval); P4/P5/P7 tap 'No' and fall through to the lander. 'No' button → markConnectOnboardingComplete + parentQuestionAnswered."},{"name":"Lander content (flat member)","exactCopy":"[if request just sent: ✓ Request sent for {name}. An existing parent will confirm you.]\\n\\nWelcome to {familyName}\\n\\nPlan trips, events, and get-togethers with everyone here. A child's milestones stay private to their parents; if one of the children here is yours, you can ask to be added on the Children tab.\\n\\n[Continue into PebblePath]\\n[Set up a family for my own children]","visibleToPersonas":["P3","P4","P5","P7"],"condition":"else branch — ineligible AND (no children OR parentQuestionAnswered)","notes":"{requestSentChildName} confirmation line shows only if a 2A request was just filed (P3 path after tapping a child). {familyName} interpolated. 'Continue into PebblePath' → markConnectOnboardingComplete (enters app as non-parent member → .ready). 'Set up a family for my own children' → useOwnPebblePathFamily() → flips to .needsFamily create flow. P4 (non-parent member), P5 (will become read-only viewer via later grant), P7 (connected member) all enter here as flat members. The old 'Open Portal on the web' CTA was dropped 2026-06-10."},{"name":"Error banner","exactCopy":"(dynamic — app.errorMessage)","visibleToPersonas":["P3","P4","P5","P6","P7"],"condition":"if let message = app.errorMessage","notes":"OnboardingErrorBanner."}]},"locationsetupview":{"id":"locationsetupview","group":"onboarding","area":"onboarding-auth-family","name":"LocationSetupView","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/LocationSetupView.swift","purpose":"Optional location step for family CREATORS only: set city/region/country (via GPS one-shot or manual) so Pebble can ground activity suggestions. City-level text only, never coordinates.","appearsForPersonas":["P1","P2","P6","P7"],"orderHint":"Reached when onboardingPhase == .needsLocation: gated to user.role == .owner (family creator), currentFamily.homeLocation == nil, children.isEmpty, !locationStepDismissed. So ONLY family creators see it: P1/P2 (creators who will add children) and P6 (childless own-family creator) and P7 only if they created their own family. JOINERS NEVER see this (P3/P4/P5 joining an existing family inherit the creator's location). For creators it's step 4 of 4. Skippable.","sections":[{"name":"Welcome image background","exactCopy":"(no text — WelcomeImageBackground())","visibleToPersonas":["P1","P2","P6","P7"],"condition":"Always (creators only)","notes":"Frosted card over photo, raised 5%."},{"name":"Back chip","exactCopy":"‹ Back","visibleToPersonas":["P1","P2","P6","P7"],"condition":"if mode != .picking","notes":"chevron.left + 'Back', resets to picker."},{"name":"Onboarding header (picking)","exactCopy":"Where are you based?  |  subtitle: Pebble uses your city to suggest activities and answer questions like \"what can we do this weekend?\" Your precise location is never stored.","visibleToPersonas":["P1","P2","P6","P7"],"condition":"mode == .picking","notes":"Step indicator 4 of 4 (totalSteps:4). In Settings-edit reuse (isEditing) the step is nil — but that's the post-onboarding Settings sheet, out of onboarding scope here."},{"name":"Onboarding header (fromGPS)","exactCopy":"Confirm your location  |  subtitle: We'll save the city below. You can change it anytime in Settings.","visibleToPersonas":["P1","P2","P6","P7"],"condition":"mode == .fromGPS","notes":""},{"name":"Onboarding header (manual)","exactCopy":"Enter your city  |  subtitle: City and country are required. State / region helps Pebble be more specific.","visibleToPersonas":["P1","P2","P6","P7"],"condition":"mode == .manual","notes":""},{"name":"Picker card — Use my location","exactCopy":"Use my location  |  Quickest — we'll just save your city, not coordinates","visibleToPersonas":["P1","P2","P6","P7"],"condition":"mode == .picking","notes":"location.fill icon. Triggers GPS resolve. Subtitle has em-dash ('Quickest — we'll') — flag for no-em-dash rule."},{"name":"Picker card — Enter manually","exactCopy":"Enter manually  |  Type your city, region, and country","visibleToPersonas":["P1","P2","P6","P7"],"condition":"mode == .picking","notes":"pencil.line icon → mode = .manual."},{"name":"Skip for now","exactCopy":"Skip for now","visibleToPersonas":["P1","P2","P6","P7"],"condition":"mode == .picking && !isEditing","notes":"Calls app.dismissLocationStep() → advances onboarding. Hidden in Settings-edit mode."},{"name":"GPS confirm card","exactCopy":"{resolved.displayLabel}  |  Looks right?\\n[Save and continue]\\n[Use a different city]","visibleToPersonas":["P1","P2","P6","P7"],"condition":"mode == .fromGPS && resolvedLocation != nil","notes":"{resolved.displayLabel} e.g. 'Brooklyn, NY · United States'. 'Save and continue' → persistAndAdvance. 'Use a different city' → manual mode prefilled. While resolving shows 'Finding your location…'."},{"name":"Manual form fields","exactCopy":"CITY (placeholder Brooklyn)  |  REGION (placeholder NY)  |  COUNTRY (placeholder United States)\\n[Save and continue]","visibleToPersonas":["P1","P2","P6","P7"],"condition":"mode == .manual","notes":"Three uppercase-labeled fields; Country defaults to 'United States'. Save gated on city + country non-empty. CTA → persistManualEntry."},{"name":"Error banner","exactCopy":"(dynamic — locationError, e.g. CLLocationManager/CLGeocoder error)","visibleToPersonas":["P1","P2","P6","P7"],"condition":"if let locationError","notes":"OnboardingErrorBanner."}]},"onboardingflowview-phase-router":{"id":"onboardingflowview-phase-router","group":"onboarding","area":"onboarding-children-router","name":"OnboardingFlowView (phase router)","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/OnboardingFlowView.swift","purpose":"Switches on AppState.onboardingPhase to render the correct onboarding surface inside a NavigationStack, with forward/back slide transitions.","appearsForPersonas":["P1","P2","P3","P4","P5","P6","P7"],"orderHint":"n/a (container; renders the surface for the current phase)","sections":[{"name":"Background underlay","exactCopy":"(no copy — Color.bgCanvas full-screen underlay; each phase view draws its own background, typically WelcomeImageBackground)","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"always (ZStack base layer)","notes":"Build 45 reverted the 'video persists through wizard' architecture; each phase view owns its background again."},{"name":"Phase switch → currentPhaseView","exactCopy":"(no copy — switches on app.onboardingPhase: .signedOut→WelcomeView, .needsFamily→FamilySetupView, .cairnConnection→CairnConnectionView, .needsLocation→LocationSetupView, .needsFirstChild→AddChildView, .needsNotifications→NotificationPermissionView, .loadingProfile/.ready→EmptyView)","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"switch app.onboardingPhase","notes":"Cross-tab two-switch hazard: this switch AND RootView's switch must both list every OnboardingPhase case. .loadingProfile/.ready render EmptyView here as a safety net (RootView actually handles them). Slide transition is forward (insert from trailing) when the new phase's orderIndex >= previous, else back (insert from leading). orderIndex: signedOut=0, needsFamily=1, cairnConnection=1 (sibling), needsLocation=2, needsFirstChild=3, needsNotifications=4, ready=5."}]},"rootview-auth-gate-onboardingphase-switch":{"id":"rootview-auth-gate-onboardingphase-switch","group":"onboarding","area":"onboarding-children-router","name":"RootView (auth gate / OnboardingPhase switch)","filePath":"ios/PebblePath/PebblePath/App/RootView.swift","purpose":"Top-level switch on onboardingPhase: routes onboarding phases to OnboardingFlowView, .loadingProfile to a spinner-with-escape-hatch, .ready to MainTabView. Also mounts global overlays (voice recording, biometric lock, member-joined Family Circle sheet, offline banner) and the appearance window override.","appearsForPersonas":["P1","P2","P3","P4","P5","P6","P7"],"orderHint":"n/a (root container, wraps every phase)","sections":[{"name":"AppearanceWindowApplier","exactCopy":"(no copy — invisible 0x0 view that sets window.overrideUserInterfaceStyle from @AppStorage(\"appearanceMode\"), default .light)","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"always","notes":"Applies Light/Dark/Auto to the whole window so tabs, pushes, sheets, covers, alerts all inherit it. No .preferredColorScheme anywhere (mixing caused a tug-of-war). Default is Light, so pre-login onboarding renders Light by default."},{"name":"Onboarding-phase branch → OnboardingFlowView","exactCopy":"(no copy) case .signedOut, .needsFamily, .cairnConnection, .needsLocation, .needsFirstChild, .needsNotifications: OnboardingFlowView()","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"app.onboardingPhase in {signedOut, needsFamily, cairnConnection, needsLocation, needsFirstChild, needsNotifications}","notes":"All six onboarding phases route to the same OnboardingFlowView, which picks the inner surface."},{"name":"LoadingProfileView (.loadingProfile)","exactCopy":"Spinner (no text initially). After 3 seconds reveals: \"This is taking longer than usual.\" + button \"Try again\" + button \"Sign out\"","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"app.onboardingPhase == .loadingProfile (auth exists but currentUser not loaded yet, OR familyId set but currentFamily listener hasn't delivered first snapshot)","notes":"Transient (~200-800ms) during sign-in and on cold launch (fresh-launch guard prevents the location screen from flashing). The 3s escape hatch recovers from a stuck profile load. 'Try again' calls retryProfileLoad(); 'Sign out' calls signOut()."},{"name":".ready branch → MainTabView","exactCopy":"(no copy) case .ready: MainTabView()","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"app.onboardingPhase == .ready","notes":"Exit of onboarding for every persona."},{"name":"Global overlays (RecordingOverlay, BiometricLockView, FamilyCircleSheet, OfflineBanner)","exactCopy":"OfflineBanner copy is owned elsewhere; member-joined sheet presents FamilyCircleSheet when app.pendingShowFamilyCircleUid != nil","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"RecordingOverlay: app.isRecordingPebbleVoice; BiometricLockView: app.isLocked; FamilyCircleSheet: app.pendingShowFamilyCircleUid != nil; OfflineBanner: always (safeAreaInset top, shows only when offline)","notes":"Not onboarding-specific but mounted at root so they cover onboarding too. OfflineBanner deliberately pushes content down (not overlay) so it doesn't obscure Welcome/onboarding CTAs."}]},"addchildview-children-fork-gate-step-0-do-you-have-children":{"id":"addchildview-children-fork-gate-step-0-do-you-have-children","group":"onboarding","area":"onboarding-children-router","name":"AddChildView — Children fork gate (step-0 \"Do you have children?\")","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/AddChildView.swift","purpose":"The parent/non-parent fork. In onboarding context (no onComplete), AddChildView opens on this question instead of the 5-step wizard. 'Yes' falls into the wizard (you become a parent); 'No' makes you a first-class childless member.","appearsForPersonas":["P1","P2","P6"],"orderHint":"P1/P2: step 4 of ~5 (Account → Family → Location → FirstChild[fork] → Notifications); P6: same position, answers No. Joiners (P3/P4/P5) never reach .needsFirstChild — they route via .cairnConnection.","sections":[{"name":"Children question (childrenQuestionContent)","exactCopy":"Header: \"Do you have children to add?\"  Body: \"This will create a parent role for you in PebblePath, you can always add this later.\"  Primary button: \"Yes, I want to add a child\"  Reassurance card (person.3.fill icon): \"Grandparents, aunts and uncles, a partner, a friend of the family — everyone gets the full space.\"  Secondary button: \"No, this is not a parent account\"","visibleToPersonas":["P1","P2","P6"],"condition":"showChildrenQuestion == (!isAdditionalChild && !childrenQuestionAnswered) && !noChildrenPhotoStep. (isAdditionalChild = onComplete != nil — the Settings 'Add another child' sheet skips this question entirely.)","notes":"Copy is verbatim from Portal onboarding-wizard.js _renderChildren. 'Yes' sets childrenQuestionAnswered=true and falls into the 5-step wizard. 'No' sets noChildrenPhotoStep=true (the optional photo step). Reassurance card uses Color.bgSurface + pebbleBorder. This is the surface that REMOVED the old forced-AddChild gate."},{"name":"No-children optional photo step (noChildrenPhotoContent)","exactCopy":"Header: \"Add a profile photo\"  Body: \"Help your family recognise you. You can change or add this anytime in Settings.\"  Photo slot label: \"You\"  Primary button: \"Continue\" (when no photo picked) / \"Save photo & continue\" (when a photo is picked)  Secondary button: \"Skip for now\"","visibleToPersonas":["P6"],"condition":"noChildrenPhotoStep == true (after tapping 'No, this is not a parent account')","notes":"P6 (solo childless creator) and any creator who answers No reaches this. Reuses pendingParentPhotoData + the wizard PhotoSlot. Both CTAs finalize via app.markChildrenOnboardingComplete() (releases the .needsFirstChild gate → user becomes a first-class non-parent member, viewerIsParent=false). 'Save photo & continue' first calls app.updateUserPhoto(data:). PhotoSlot initial = currentUser?.displayName ?? 'You'."},{"name":"Error banner (OnboardingErrorBanner)","exactCopy":"(dynamic — app.errorMessage; rendered with exclamationmark.triangle.fill icon, terracotta tint)","visibleToPersonas":["P1","P2","P6"],"condition":"if let message = app.errorMessage","notes":"Shared across all AddChildView states. onAppear clears app.errorMessage so a stale Firestore error (e.g. 'Missing or insufficient permissions' from sign-out teardown) doesn't appear unprompted."},{"name":"Frosted card container + WelcomeImageBackground","exactCopy":"(no copy — .regularMaterial frosted card on the static welcome beach image, vertically centered, offset up 5% of screen height)","visibleToPersonas":["P1","P2","P6"],"condition":"always (GeometryReader + ScrollView + Spacer/card/Spacer)","notes":"Canonical onboarding card pattern. Nav bar hidden in onboarding context (toolbar(.hidden) when !isAdditionalChild)."}]},"addchildview-step-1-name":{"id":"addchildview-step-1-name","group":"onboarding","area":"onboarding-children-router","name":"AddChildView — Step 1: name","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/AddChildView.swift","purpose":"First wizard step: collect the child's name.","appearsForPersonas":["P1","P2"],"orderHint":"P1/P2: wizard step 1 of 5 (after answering 'Yes' on the children fork). Also reached by any persona via Settings → 'Add another child' (out of onboarding scope).","sections":[{"name":"Wizard chrome (back chevron + step counter + 5-segment progress)","exactCopy":"Step label: \"Step 1 of 5\" (no chevron on step 1) / \"Step {step} of 5\" with a left chevron on steps 2-5","visibleToPersonas":["P1","P2"],"condition":"!showChildrenQuestion (i.e. childrenQuestionAnswered==true), all wizard steps","notes":"FiveSegmentProgress: completed segments teal, current segment terracotta, future pebbleBorder. Back chevron only when step > 1."},{"name":"Name step body","exactCopy":"Header: \"What's your child's name?\"  Body: \"We'll use this to personalize everything — tips, milestones, alerts.\"  TextField placeholder: \"Felix\"  Button: \"Next\"","visibleToPersonas":["P1","P2"],"condition":"step == 1","notes":"Next disabled until trimmed name non-empty. submitLabel .next; onSubmit advances if non-empty. Field border teal when non-empty, pebbleBorder when empty."}]},"addchildview-step-2-date-of-birth-premature":{"id":"addchildview-step-2-date-of-birth-premature","group":"onboarding","area":"onboarding-children-router","name":"AddChildView — Step 2: date of birth + premature","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/AddChildView.swift","purpose":"Collect DOB (month/day/year boxes) and a premature flag for corrected-age milestones.","appearsForPersonas":["P1","P2"],"orderHint":"P1/P2: wizard step 2 of 5","sections":[{"name":"DOB step body","exactCopy":"Header: \"When was {name} born?\" (or \"When was your child born?\" when name empty)  Body: \"This lets us show age-appropriate milestones and timing.\"  Month box placeholder: \"Month\"  Day box placeholder: \"Day\"  Year box placeholder: \"Year\"  Button: \"Next\"","visibleToPersonas":["P1","P2"],"condition":"step == 2","notes":"Header interpolates the entered name; falls back to 'your child'. Year menu offers last 18 years (thisYear-17 ... thisYear). Day field digit-clamped to 2 chars. Next disabled until dobIsValid (month 1-12, year >=1900, day 1-31, valid Calendar date)."},{"name":"Premature card","exactCopy":"Title: \"Premature?\"  Subtitle: \"We'll adjust milestones for corrected age.\"  Chips: \"Yes\" / \"No\" / \"Not sure\"","visibleToPersonas":["P1","P2"],"condition":"step == 2 (within DOB step)","notes":"On ppSandLight background. If 'Yes' selected, 'Premature birth' is appended to developmentalFlags on save. Default prematureChoice is .notAnswered (no chip selected)."}]},"addchildview-step-3-areas-of-focus":{"id":"addchildview-step-3-areas-of-focus","group":"onboarding","area":"onboarding-children-router","name":"AddChildView — Step 3: areas of focus","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/AddChildView.swift","purpose":"Optional multi-select developmental focus flags.","appearsForPersonas":["P1","P2"],"orderHint":"P1/P2: wizard step 3 of 5","sections":[{"name":"Focus step body","exactCopy":"Header: \"Any areas of focus?\"  Body: \"Select all that apply. No judgment — just support.\"  Chip options (2-col grid): \"Speech / language\", \"Motor skills\", \"Social interactions\", \"Eating / feeding\", \"Sleep\", \"Sensory\", \"General concern\"  Button: \"Next\"  Secondary: \"Skip for now\"","visibleToPersonas":["P1","P2"],"condition":"step == 3","notes":"Multi-select; chips turn teal-tinted when selected. Both 'Next' and 'Skip for now' call advance() (no validation). Selected flags saved as developmentalFlags."}]},"addchildview-step-4-photos":{"id":"addchildview-step-4-photos","group":"onboarding","area":"onboarding-children-router","name":"AddChildView — Step 4: photos","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/AddChildView.swift","purpose":"Optional photo capture: child, you, co-parent (onboarding) or just child (additional-child sheet).","appearsForPersonas":["P1","P2"],"orderHint":"P1/P2: wizard step 4 of 5","sections":[{"name":"Photos step body — onboarding (3 slots)","exactCopy":"Header: \"Add photos\"  Body: \"A familiar face makes the app feel personal. You can always add these in Settings later.\"  Photo slot labels: \"{child name}\" (or \"Child\" when empty), \"You\", \"Co-parent\"  Button: \"Next\"  Secondary: \"Skip for now\"","visibleToPersonas":["P1","P2"],"condition":"step == 4 && !isAdditionalChild","notes":"Three PhotoSlots. 'You' slot initial = currentUser?.displayName ?? 'Y'; 'Co-parent' initial = 'C'. Co-parent photo is uploaded to Storage on save and handed off to the joining co-parent. Both 'Next' and 'Skip for now' advance."},{"name":"Photos step body — additional-child sheet (1 slot)","exactCopy":"Header: \"Add a photo\"  Body: \"A familiar face makes {child name}'s dashboard feel personal. You can always add this in Settings later.\"  Single child photo slot  Button: \"Next\"  Secondary: \"Skip for now\"","visibleToPersonas":["P1","P2","P3"],"condition":"step == 4 && isAdditionalChild (Settings 'Add another child' sheet — NOT the onboarding flow)","notes":"Out of strict onboarding scope but documented: reached only via Settings by an existing parent (P1/P2, or P3 after they've become a parent). Only the child slot renders (parent + co-parent already set). displayName interpolated; 'your child' when name empty."}]},"addchildview-step-5-summary":{"id":"addchildview-step-5-summary","group":"onboarding","area":"onboarding-children-router","name":"AddChildView — Step 5: summary","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/AddChildView.swift","purpose":"Confirmation + plan recap + privacy/co-parent reassurance, then save the child and enter the app.","appearsForPersonas":["P1","P2"],"orderHint":"P1/P2: wizard step 5 of 5 (final wizard step before .needsNotifications)","sections":[{"name":"Summary header + plan card","exactCopy":"Header: \"You're all set.\"  Body: \"We've personalized {name}'s dashboard with age-appropriate milestones and tips. The longer you use PebblePath, the smarter it gets.\"  Plan card eyebrow: \"YOUR PLAN\"  Rows: \"Child\" → {name}; \"Born\" → {Mon D, YYYY}; \"Focus\" → selected flags joined by \", \" or \"General development\" when none","visibleToPersonas":["P1","P2"],"condition":"step >= 5 (default case)","notes":"Plan card on teal-light gradient with white text. dobFormatted shows 'Mon D, YYYY' (e.g. 'Oct 27, 2025') or '—' if incomplete. displayName falls back to 'your child'."},{"name":"Privacy + co-parent reassurance panel","exactCopy":"Row 1 (lock.fill): \"{name}'s milestones stay private to their parents. Any family member can request access — you decide.\"  Row 2 (person.2.fill): \"{name}'s other parent joins with the same family code. You'll get a prompt to confirm them as a parent.\"","visibleToPersonas":["P1","P2"],"condition":"step >= 5 && !isAdditionalChild","notes":"Informational only — NO toggle (children are already private-by-default via the isChildParent rule). Communicates the flat-family privacy model + the co-parent-confirm flow. Hidden in the additional-child sheet (parent already knows the model). Color.bgSurface + pebbleBorder."},{"name":"Open dashboard CTA","exactCopy":"Button: \"Open {name}'s dashboard\" (idle) / \"Setting up {name}…\" (while saving)","visibleToPersonas":["P1","P2"],"condition":"step >= 5","notes":"displayName interpolated ('your child' fallback). Synchronous isSavingChild re-entry guard prevents double-tap duplicate-child docs. save() calls app.addChild(...) then persists parent photo + co-parent handoff. After save, onboardingPhase advances (children non-empty → .needsFirstChild gate releases → .needsNotifications). For the additional-child sheet, selects the new child + jumps to Home tab + calls onComplete()."}]},"notificationpermissionview-final-onboarding-step":{"id":"notificationpermissionview-final-onboarding-step","group":"onboarding","area":"onboarding-children-router","name":"NotificationPermissionView (final onboarding step)","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/NotificationPermissionView.swift","purpose":"One-time iOS push-permission ask after all data-entry phases. Fires for every persona (gated on User.notificationsOnboardingComplete). Copy is persona-aware (parent vs non-parent).","appearsForPersonas":["P1","P2","P3","P4","P5","P6","P7"],"orderHint":"P1/P2: step 5 (Account→Family→Location→Child→Notifications); P6: step 5 (Account→Family→Location→FirstChild[No+photo]→Notifications); P3/P4: step 3 (Account→Family[join]→cairnConnection→Notifications); P7: via own-family path (P1/P2/P6). Always the LAST onboarding gate before .ready.","sections":[{"name":"Header (OnboardingHeader, parent variant)","exactCopy":"Title: \"Stay in the loop\"  Subtitle: \"PebblePath uses notifications to keep both parents in sync — when one of you logs a milestone, when Pebble has a fresh tip, or when something needs your attention.\"","visibleToPersonas":["P1","P2","P3","P7"],"condition":"app.viewerIsParent == true (true iff signed-in uid ∈ some child.parentIds)","notes":"Step counter omitted (step: nil) because creators and joiners reach here via different step counts. P3 only sees this variant if their 2A claim has ALREADY been approved by the time they reach the notif gate; a freshly-claimed P3 (claim pending) is still non-parent and sees the non-parent variant below. P7 sees the parent variant because they reach onboarding via their own family with children."},{"name":"Header (OnboardingHeader, non-parent variant)","exactCopy":"Title: \"Stay in the loop\"  Subtitle: \"PebblePath will give you a gentle heads-up when there's something new from your family. No noise, no marketing.\"","visibleToPersonas":["P3","P4","P5","P6"],"condition":"app.viewerIsParent == false","notes":"Non-parents (incl. P6 solo childless, P4 non-parent member, P5 read-only viewer, and a P3 whose 2A claim is still pending) get the honest lighter framing — they don't receive milestone/tip/brief pushes (CF scopes those to a child's parents). Title is shared ('Stay in the loop')."},{"name":"Bullets card — parent variant","exactCopy":"Row 1 (checkmark.circle.fill) \"Milestones\": \"Get notified when your co-parent logs a new milestone.\"  Row 2 (lightbulb.fill) \"Pebble tips\": \"Fresh personalised tips and reminders when there's something to know.\"  Row 3 (calendar.badge.clock) \"Reminders\": \"Gentle nudges for upcoming check-ins and school deadlines.\"","visibleToPersonas":["P1","P2","P3","P7"],"condition":"app.viewerIsParent == true","notes":"Three bullets. Same parent-set as the parent subtitle above."},{"name":"Bullets card — non-parent variant","exactCopy":"Row 1 (bell.badge.fill) \"Family updates\": \"Know when there's something new to see in your family.\"  Row 2 (hand.wave.fill) \"When you're needed\": \"A gentle nudge if your family reaches out to you.\"","visibleToPersonas":["P3","P4","P5","P6"],"condition":"app.viewerIsParent == false","notes":"Two bullets only (vs three for parents). Honest framing — no milestone/tip promises."},{"name":"Privacy reassurance line","exactCopy":"\"You can change this anytime in Settings → Notifications.\"","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"always","notes":"Shown to all personas regardless of parent status."},{"name":"CTAs (Turn on / Maybe later)","exactCopy":"Primary button: \"Turn on notifications\"  Secondary button: \"Maybe later\"","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"always","notes":"'Turn on notifications' (teal style, spinner while isRequesting) → NotificationService.requestPermission() → completeNotificationsOnboarding(granted:). 'Maybe later' → completeNotificationsOnboarding(granted: false) WITHOUT prompting iOS. Both set User.notificationsOnboardingComplete = true server-side, so the phase advances to .ready and never re-fires for this user on any device."}]},"cairnconnectionview-2a-claim-connect-flow":{"id":"cairnconnectionview-2a-claim-connect-flow","group":"onboarding","area":"onboarding-children-router","name":"CairnConnectionView — 2A claim / connect flow","filePath":"ios/PebblePath/PebblePath/Screens/Onboarding/CairnConnectionView.swift","purpose":"Shown for OnboardingPhase.cairnConnection — a user who has a cairnFamilyId but no PP familyId (joined via invite code on iOS, or used Portal/web first). Branches into: own-household opt-in, the 2A 'are you a parent/caregiver?' claim prompt, or a non-parent lander.","appearsForPersonas":["P3","P4","P5"],"orderHint":"P3/P4: appears AFTER FamilySetupView 'I have an invite code' (redeemConnectCode adds them to cairnMemberIds, NOT familyId), as the step after .needsFamily. Equivalent step ~2-3 of their flow. P5 begins here identically to P4 (read-only access is granted later in Settings, not during onboarding).","sections":[{"name":"Sign out escape hatch","exactCopy":"Button: \"Sign out\" (top-right). Alert title: \"Sign out of PebblePath?\" with \"Cancel\" / \"Sign out\"","visibleToPersonas":["P3","P4","P5"],"condition":"always (first surface a cairn-first / joiner user lands on; nav bar hidden)","notes":"Permanent escape hatch on every state of this screen."},{"name":"Loading state","exactCopy":"\"Checking your family…\" (with spinner)","visibleToPersonas":["P3","P4","P5"],"condition":"!didLoad (while fetchCairnFamily() + fetchCairnChildren() run)","notes":"One-shot .task on appear."},{"name":"Own-household opt-in (optInContent)","exactCopy":"Title: \"Set up your family\"  Body: \"You started **{familyName}**. Set it up here to add your children, track milestones, and get Pebble (your AI parenting guide), all in the same family.\"  Primary button: \"Set up your family\" (idle) / \"Setting up…\" (loading)  Secondary: \"Not right now\"","visibleToPersonas":[],"condition":"isEligibleOwnHousehold == (family.createdBy == myUid && family.memberIds.isEmpty)","notes":"This branch is the Category-C own-Portal-household owner (used Portal/web to create their OWN family with no other members yet) — not cleanly one of P1-P7 as defined (it's a web-first creator). Listed here for completeness. 'Set up your family' calls confirmCairnUpgrade(familyId:) which resolves their familyId and routes them onward as a parent-to-be. 'Not right now' triggers the sign-out confirm. NONE of P3/P4/P5/P6 hit this — a code redeemer has createdBy != me OR memberIds non-empty."},{"name":"2A parent/caregiver claim prompt (parentPromptContent)","exactCopy":"Title: \"Are you a parent or caregiver in {familyName}?\"  Body: \"You've joined **{familyName}**. If you're a parent or active caregiver of one of these children, ask to be linked to them; an existing parent confirms it. You won't see a child's information until they do.\"  Per-child rows: {child.name} with a chevron.right  Secondary button: \"No, I'm not a parent or caregiver here\"","visibleToPersonas":["P3","P4"],"condition":"family != nil && !cairnChildren.isEmpty && !parentQuestionAnswered (i.e. ineligible-for-opt-in joiner whose family HAS children, not yet answered)","notes":"THIS is how P3 (co-parent joiner) reaches the parent persona: tapping a child calls requestToBeCoParent(of:) which FILES a 2A CoParentRequest (grants nothing — an existing parent must confirm), then markConnectOnboardingComplete() + sets requestSentChildName + parentQuestionAnswered=true (which then renders landerContent with the success line). A user who taps a child = P3 (claiming parent). A user who taps 'No' = P4 (genuine non-parent member); 'No' calls markConnectOnboardingComplete() and falls to the lander. Until the claim is approved, the claimant is still viewerIsParent=false."},{"name":"Non-parent lander (landerContent)","exactCopy":"Optional success line (when a claim was just filed): \"✓ Request sent for {child name}. An existing parent will confirm you.\"  Title: \"Welcome to {familyName}\"  Body: \"Plan trips, events, and get-togethers with everyone here. A child's milestones stay private to their parents; if one of the children here is yours, you can ask to be added on the Children tab.\"  Primary button: \"Continue into PebblePath\"  Secondary: \"Set up a family for my own children\"","visibleToPersonas":["P3","P4","P5"],"condition":"fall-through: not loading, not eligible-own-household, and (family has no children OR parentQuestionAnswered==true). Reached by: a joiner whose family has NO children; or after answering the 2A prompt (either tapped a child → success line shows, or tapped 'No').","notes":"P3 sees this with the '✓ Request sent…' success line after filing a claim. P4/P5 see it without the success line. 'Continue into PebblePath' → markConnectOnboardingComplete() → attaches read-only listeners → routes to .needsNotifications then .ready (full app, non-parent persona). 'Set up a family for my own children' → useOwnPebblePathFamily() (flips cairnUserWantsOwnFamily) → routes to .needsFamily for a brand-new separate family (never grants access to this family's data)."},{"name":"Error banner","exactCopy":"(dynamic — app.errorMessage; OnboardingErrorBanner)","visibleToPersonas":["P3","P4","P5"],"condition":"if let message = app.errorMessage","notes":"Shared across all states of this screen."}]},"dashboardview-parenthome-branch":{"id":"dashboardview-parenthome-branch","group":"home","area":"home-dashboard-tab","name":"DashboardView (parentHome branch)","filePath":"/Users/thomasparis/Desktop/PebblePath/ios/PebblePath/PebblePath/Screens/Dashboard/DashboardView.swift","purpose":"Home for parents (uid in some child.parentIds). Calm Home: full-bleed photo hero + greeting, Family Brief card, capture/packing prompts, family coming-up, your-family strip, Pebble teaser. Child-specific content lives on Children tab.","appearsForPersonas":["P1","P2","P3"],"orderHint":"n/a","sections":[{"name":"homeHero — photo backdrop","exactCopy":"(no text) Full-bleed photo: Image(\"sandbar-hero\") in light mode, Image(\"stillwater-bg\") in dark mode. Bottom ~42% dissolves to transparent into the mesh; subtle top scrim for status-bar legibility.","visibleToPersonas":["P1","P2","P3"],"condition":"always inside parentHome (app.viewerIsParent == true). Image source switches on @Environment(\\.colorScheme): dark → \"stillwater-bg\", else \"sandbar-hero\".","notes":"heroHeight = topSafeInset + 300. Runs edge-to-edge under the status bar via .ignoresSafeArea(edges: .top). No copy."},{"name":"homeHero — greeting block (date + greeting title)","exactCopy":"Line 1 (subtitle): {longWeekdayDate} e.g. \"Thursday May 28\" (format \"EEEE MMMM d\", no year).\nLine 2 (title): \"{greeting}, {parentDisplayName}\" — greeting is \"Good morning\" (<12h) / \"Good afternoon\" (<18h) / \"Good evening\" (else). Stem \"{greeting}, \" in fgPrimary; the name in brand green (light #1F5C54 / dark #5CBFB0).","visibleToPersonas":["P1","P2","P3"],"condition":"always inside parentHome. Name = app.currentUser?.displayName ?? \"\". Date 15pt, greeting 30pt black, lineLimit(1) minimumScaleFactor(0.8).","notes":"Dynamic: greeting phrase changes by hour; name interpolated. If displayName is empty the title renders \"{greeting}, \" with no trailing name."},{"name":"homeHero — family avatar stack → Settings","exactCopy":"(no visible text) Overlapping avatar pair (current user first, co-parent overlapping right edge if present), size 40. Tapping opens the Settings sheet (SettingsView). VoiceOver label: \"Open settings\" solo, or \"You and {coparentName}. Open settings.\" when a co-parent exists in memberIds.","visibleToPersonas":["P1","P2","P3"],"condition":"always inside parentHome (top-trailing overlay on homeHero). Co-parent name resolved from currentFamily.memberIds.first(where != myUid) → memberProfiles[uid].displayName.","notes":"Tap target → settingsPresented = true → .sheet { SettingsView() }. Single avatar when no co-parent in memberIds."},{"name":"Family Brief hero card (FamilyBriefHeroCard) — ACTIVE brief surface","exactCopy":"Eyebrow: \"FAMILY BRIEF\" (10pt semibold, tracking 1.3, teal). Top-right: last-generated time e.g. \"6:14 am\" + refresh icon (arrow.clockwise, accessibilityLabel \"Refresh family brief\"). Title: {card.title} (brand green). Body: up to 4 bullets, each a colored pebble marker + 2-part text (bold lead clause split at first '. '/': '/' — ' up to 32 chars, then regular remainder). Loading state: redacted skeleton bars. Empty state: \"Your family brief will appear here each morning.\"","visibleToPersonas":["P1","P2","P3"],"condition":"Rendered when `familyBriefHeroTest == true` (CURRENTLY TRUE) via `familyBriefHero`, replacing childSection. Card = app.familyDailyCard ?? app.dailyCard. familyDailyCard only populates for children.count >= 2 (P2); P1/P3-single fall back to the per-child app.dailyCard. Eyebrow is always \"FAMILY BRIEF\" regardless.","notes":"DATA-DRIVEN: P2 (2+ kids) → family-scope synthesis brief; P1/single-child P3 → per-child brief. Bullets/title come from the CF-generated DailyPebbleCard; if no bullets, falls back to card.body prose (4 lines). isGenerating shows skeleton. The original childSection (full ChildCardView photo card) is HIDDEN by this flag; flip familyBriefHeroTest=false to restore it."},{"name":"Family Brief — coordination footer (Today's roles)","exactCopy":"Divider. Optional swap line (when a role is overridden today): faces + \"Tonight: {role} is on {you/name(s)/someone else}. Usually {usualName(s)}.\" OR for multiple swaps \"Tonight: {N} role swaps. Tap Today's roles for who's on what.\" Button (always): \"Today's roles\" + chevron → opens TodaysRolesSheet.","visibleToPersonas":["P1","P2","P3"],"condition":"Inside FamilyBriefHeroCard, rendered only `if app.viewerIsParent`. The swap line renders only when app.coordinationRoles has an override active today (app.isOverriddenToday); otherwise just the \"Today's roles\" button.","notes":"TodaysRolesSheet header: \"Who's got what\" / \"Tap to swap roles for today. The routine resets tomorrow.\" Footer link in that sheet: \"Daily roles & routines\" → Settings memory. Parent-only; never on non-parent/viewer Home."},{"name":"ProactivePebbleCard + FamilyProactivePebbleCard (Pebble Daily / Family brief) — GATED OFF","exactCopy":"ProactivePebbleCard: eyebrow \"PEBBLE DAILY\" (or shared InformationalBriefCard \"Family brief\" in brief mode), title + body, \"Ask Pebble\" chip, collapsible. FamilyProactivePebbleCard: InformationalBriefCard with eyebrow \"Family brief\". Loading \"PEBBLE DAILY\" skeleton.","visibleToPersonas":[],"condition":"Rendered ONLY when `familyBriefHeroTest == false` (CURRENTLY FALSE → not shown). When active: FamilyProactivePebbleCard gated on app.viewerIsParent (and self-gates N>=2); ProactivePebbleCard renders for any parent with a dailyCard.","notes":"Currently DEAD on Home because familyBriefHeroTest=true. Documented for completeness / in case the experiment flag flips. FamilyBriefHeroCard is the live replacement."},{"name":"CaptureGatePrompt (\"Pebble noticed something\")","exactCopy":"Eyebrow (uppercase, sparkles glyph): \"PEBBLE NOTICED SOMETHING\". Body = candidate.prompt, one of:\n• \"Should Pebble know about any allergies or medical info for {childName}?\" (buttons: \"Yes, add one\" / \"No, none\" / \"Not now\")\n• \"Is {childName} at daycare, school, or preschool on weekdays? Pebble can plan around it.\" (buttons: \"Set it up\" / \"They're home\" / \"Not now\")\n• \"What's one routine in your week Pebble should remember? Bedtime, school drop-off, swim class…\" (buttons: \"Add one\" / \"Not now\")","visibleToPersonas":["P1","P2","P3"],"condition":"if app.viewerIsParent, let candidate = app.captureCandidate { CaptureGatePrompt(...) } — AND app.selectedChild != nil (whole block gated). At most ONE candidate/day per device (4-filter gate + recent-asks log). Medical/schooling prompts only when that child lacks the anchor/rhythm; first-rhythm prompt only when family has zero rhythms.","notes":"DATA-DRIVEN: prompt text + button set vary by candidate kind. childName interpolated. The two-button form omits the middle \"No, none\"/\"They're home\" resolve button when candidate.resolveLabel is nil (the first-rhythm seed). Accept opens AnchorEditSheet or RhythmEditSheet (prefilled). Hidden entirely most days."},{"name":"PackingDashboardCard (per upcoming trip)","exactCopy":"Suitcase glyph + Title: \"Packing for {tripTitle}\". Subtitle by urgency: \"Leaving today\" / \"Leaving tomorrow\" / \"{N} days out, still time to review\" (T-3 terracotta) or \"{N} days out\" (T-7 teal). Chevron.","visibleToPersonas":["P1","P2","P3"],"condition":"if app.viewerIsParent { ForEach(packingPromptTrips) { PackingDashboardCard(trip:) } } AND app.selectedChild != nil. packingPromptTrips = trips whose startDate is 0–7 days out. Card self-gates: renders nothing outside [-? ..+7] window (hidden once trip is ongoing/>7d).","notes":"One card per qualifying trip; none if no trip in window (common). Tap opens PackingListView fullScreenCover. Parent-only (non-parents still see the trip in FamilyComingUpSection but not this packing prompt)."},{"name":"FamilyComingUpSection (\"Upcoming Activities\")","exactCopy":"Section header: \"Upcoming Activities\" with action link \"View all\" (→ Activities tab). Rows: date rail (\"Now\"/\"Today\" teal chip, or \"{WEEKDAY/MONTH} {day}\" teal-wash chip) + title + optional subtitle line ({calTag} · {location/subtitle}). Empty state: \"No upcoming family plans yet — head to Activities to add a trip or celebration.\"","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"Rendered inside parentHome (gated by selectedChild != nil) AND inside NonParentHomeView AND ViewerHomeView (always). Merges app.trips (upcoming/ongoing) + celebration familyEvents + derived child birthdays + standalone activities (tripId nil, upcoming); top 3 by date.","notes":"Shared component across all 3 persona branches. P7 (connected family): cross-family co-planned trips/events appear here IF they're in app.trips/familyEvents/activities (visibleTo-scoped) — child data never leaks (only trips/events/activities). Tap opens the item's detail sheet ON Home (trip/event/activity); derived birthdays (bday: id) route to Activities tab. Empty state is a tappable card → Activities."},{"name":"FamilyStripCard (\"Your family\")","exactCopy":"Overlapping avatar row (cap 5 + \"+{N}\" overflow chip). Title: \"Your family\". Subtitle (memberCountLabel): \"Just you\" (n<=1) / \"{N} members\". Chevron. AccessibilityLabel \"Your family — {memberCountLabel}\", hint \"Opens the family circle\".","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"Rendered inside parentHome (gated by selectedChild != nil) AND NonParentHomeView AND ViewerHomeView (always). memberCountLabel from app.familyRoster.count (memberIds ∪ cairnMemberIds ∪ childViewers, deduped). Tap → FamilyCircleSheet.","notes":"Shared across all branches. P6 (solo childless) shows \"Just you\" with a single avatar. Opens FamilyCircleSheet (NavigationStack { FamilyCircleView } + Done, .large detent)."},{"name":"advisorTeaser (\"Got a parenting question?\")","exactCopy":"Pebble Ripple icon. Title: \"Got a parenting question?\". Body: \"Ask Pebble — tuned to {selectedChildName ?? \"your child\"}'s age & progress.\" Chevron. Tapping → Pebble (advisor) tab.","visibleToPersonas":["P1","P2","P3"],"condition":"Rendered inside parentHome only, gated by `if app.selectedChild != nil`. Background = selected child's theme→themeDark gradient (falls back to brand teal/Sea Glass when no child). NOT present in NonParentHomeView or ViewerHomeView.","notes":"PARENT-ONLY (Pebble is parent-gated). Child name interpolated into the subtitle. Gradient is per-child themed."},{"name":"childSection / ChildCardView — GATED OFF (alt to Family Brief hero)","exactCopy":"Single child: ChildCardView — avatar (88) + child.name (28pt) + ageLabel + progress bar + \"{N}%\" + \"{done} of {total} active milestones\". Multi-child: horizontal carousel of ChildCardView with symmetric sibling peeks.","visibleToPersonas":[],"condition":"Rendered ONLY when `familyBriefHeroTest == false` (CURRENTLY FALSE). When active: single card if app.children.count <= 1, else carousel. Tap on centered card → jumpToMilestones; tap sibling → selectChild (animated carousel slide).","notes ns up on {date}.\" (falls back to \"Both parents share the same 5-question pool. The window resets in a few days.\" when no rollover date). Footer: \"Premium plans with unlimited questions are coming soon.\"","visibleToPersonas":["P1","P2","P3","P4","P5","P6"],"condition":"limitReachedComposer (lines 821-847), shown when `atLimit` (remainingThisWeek == 0 AND not bypassed). Replaces the normal composer.","notes":"DATA-DRIVEN: interpolates the family's pebbleWeekRollover() date (medium date style) when available. Never shows for bypassed testers (atLimit returns false). Quota is family-shared."},{"name":"Paywall sheet (hook from quota exhaustion)","exactCopy":"Presented sheet = PaywallView(contextLine: app.paywallContext) with SubscriptionService. (PaywallView copy lives in PaywallView.swift — outside this audit area; this records the hook only.)","visibleToPersonas":["P1","P2","P3","P4","P5","P6"],"condition":".sheet(isPresented: paywallBinding) (lines 328-331) bound to app.showPaywall, which AppState flips when the user hits the weekly cap on the free tier. Warning haptic fires on showPaywall.","notes":"Premium scopes to the child's co-parent(s)/parent only — extended members never see this because non-parents never reach the parentAdvisor branch. Triggered by quota exhaustion when not bypassed."},{"name":"Smart Upload — source popup (Camera / Photos / Files)","exactCopy":"Sheet title: \"Smart Upload\". Subtitle: \"Upload a flier, schedule, or school calendar — a PDF, photo, or Word doc. Pebble reads the dates and you pick what to add.\" Rows: 1) \"Take a photo\" / \"Snap a flier or schedule\" (camera.fill, terracotta); 2) \"Choose from Photos\" / \"Pick a screenshot or image\" (photo.on.rectangle, teal); 3) \"Choose a file\" / \"PDF, image, or Word doc\" (doc.fill, dark teal).","visibleToPersonas":["P1","P2","P3","P4","P5","P6"],"condition":".sheet(isPresented: $showImportSourcePopup) (lines 268-272) — opened from the Smart Upload landing card OR the composer paper
