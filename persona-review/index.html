  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--body); color:#eaf3f0; -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1100px 700px at 88% -10%, rgba(61,155,143,.34), transparent 58%),
      radial-gradient(900px 720px at 6% 8%, rgba(22,70,63,.55), transparent 60%),
      radial-gradient(1000px 800px at 50% 118%, rgba(198,123,92,.16), transparent 60%),
      linear-gradient(160deg,#1d564e 0%, #173f39 52%, #143731 100%);
    background-attachment:fixed; min-height:100vh;
  }
  h1,h2,h3,h4{font-family:var(--disp); margin:0}

  /* ── Top bar ── */
  header.top{
    position:sticky; top:0; z-index:50; backdrop-filter:blur(16px);
    background:rgba(20,55,49,.72); border-bottom:1px solid rgba(255,255,255,.08);
    padding:14px 24px 13px;
  }
  .top h1{font-size:19px; font-weight:900; letter-spacing:-.01em; color:#fff}
  .top h1 .ios{font-weight:700; color:var(--teal-light); font-size:13px; margin-left:4px}
  .top .sub{font-size:12.5px; color:#bcd6d0; margin-top:2px}
  .barrow{display:flex; flex-wrap:wrap; gap:14px 30px; align-items:flex-end; margin-top:14px}
  .group{display:flex; flex-direction:column; gap:7px}
  .group > .glabel{font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:#8fb6ae}
  .chips{display:flex; flex-wrap:wrap; gap:7px}
  .chip{
    font-family:var(--disp); font-weight:800; cursor:pointer; text-align:left;
    border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.06); color:#dcefe9;
    padding:7px 13px; border-radius:13px; transition:.13s; white-space:nowrap; line-height:1.15;
  }
  .chip:hover{border-color:var(--teal-light); background:rgba(92,191,176,.12)}
  .chip.persona{display:flex; flex-direction:column; gap:1px; min-width:96px; position:relative}
  .chip.persona .pn{font-size:13.5px}
  .chip.persona .pr{font-size:9.5px; font-weight:700; color:#9cc1ba; letter-spacing:.01em}
  /* #10 — persona description as a hover tooltip (was an always-visible
     banner that ate page real-estate). */
  .ptip{
    position:absolute; top:calc(100% + 8px); left:0; z-index:60;
    width:290px; max-width:78vw; padding:11px 13px; border-radius:12px;
    background:rgba(11,32,29,.97); border:1px solid rgba(92,191,176,.32);
    box-shadow:0 16px 40px rgba(0,0,0,.45);
    opacity:0; visibility:hidden; transform:translateY(-4px); transition:.14s;
    pointer-events:none; white-space:normal;
  }
  .chip.persona:hover .ptip{opacity:1; visibility:visible; transform:translateY(0)}
  .ptip .pt-h{font-family:var(--disp); font-weight:900; font-size:12.5px; color:#fff; display:flex; align-items:center; gap:8px; margin-bottom:5px}
  .ptip .pt-d{font-family:var(--body); font-weight:400; font-size:11.5px; color:#cfe6e1; line-height:1.5}
  /* #11 — auxiliary "More" views, moved to the bottom of the page. */
  .auxfoot{max-width:1180px; margin:26px auto 40px; padding:18px 24px 0; border-top:1px solid rgba(255,255,255,.08)}
  .chip.on{background:#fff; color:var(--teal-deep); border-color:#fff}
  .chip.on .pr{color:var(--teal-mid)}
  .chip.view{font-size:12.5px}
  .chip.view.on{background:var(--teal-light); color:#0f322d; border-color:var(--teal-light)}
  .branchTag{display:inline-block; font-size:9.5px; font-weight:800; padding:1px 7px; border-radius:6px; vertical-align:middle}
  .b-parent{background:rgba(92,191,176,.22); color:#bff0e7}
  .b-nonparent{background:rgba(198,123,92,.26); color:#f3c9b6}
  .b-viewer{background:rgba(139,123,181,.28); color:#d8cdf0}

  .personaCard{margin-top:13px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:11px 15px; display:none}
  .personaCard.show{display:flex; gap:14px; align-items:center}
  .personaCard .pl{font-family:var(--disp); font-weight:900; font-size:15px; color:#fff; display:flex; align-items:center; gap:9px}
  .personaCard .pd{font-size:12px; color:#cfe6e1; line-height:1.5}

  /* ── Stage ── */
  main{padding:22px 24px 90px; max-width:1640px; margin:0 auto}
  .stageHead{font-family:var(--disp); font-weight:800; font-size:15px; color:#eafffb; margin:4px 2px 16px; display:flex; align-items:center; gap:11px; flex-wrap:wrap}
  .stageHead .pill{font-size:11px; font-weight:700; color:#bcd6d0; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); padding:3px 10px; border-radius:999px}
  .caption{font-size:12.5px; color:#bcd6d0; margin:-8px 2px 16px; line-height:1.5; max-width:760px}
  .caption b{color:#eafffb}

  /* ── Phone shell ── */
  .flowrow{display:flex; gap:30px; overflow-x:auto; padding:6px 4px 22px; align-items:flex-start; scroll-snap-type:x proximity}
  .flowrow::-webkit-scrollbar{height:9px} .flowrow::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18); border-radius:9px}
  .phonewrap{flex:0 0 auto; scroll-snap-align:center; display:flex; flex-direction:column; align-items:center}
  .stepno{font-family:var(--disp); font-weight:900; font-size:12px; color:var(--teal-deep); background:#fff; width:24px; height:24px; border-radius:999px; display:flex; align-items:center; justify-content:center; margin:0 0 9px; box-shadow:0 3px 9px rgba(0,0,0,.2)}
  .steplbl{font-family:var(--disp); font-weight:800; font-size:11.5px; color:#cfe6e1; margin-top:9px; text-align:center; max-width:260px}

  .phone{border-radius:42px; background:#0e1f1c; padding:9px; box-shadow:0 26px 56px rgba(8,30,27,.5), inset 0 0 0 2px rgba(255,255,255,.05); position:relative}
  .phone.lg{padding:10px; border-radius:46px}
  .notch{position:absolute; top:11px; left:50%; transform:translateX(-50%); width:96px; height:22px; background:#0e1f1c; border-radius:0 0 16px 16px; z-index:5}
  .screen{
    width:288px; height:610px; border-radius:33px; overflow:hidden; display:flex; flex-direction:column; position:relative;
    background:
      radial-gradient(320px 200px at 8% -4%, rgba(212,168,67,.10), transparent 60%),
      radial-gradient(340px 240px at 110% 4%, rgba(92,191,176,.16), transparent 55%),
      linear-gradient(165deg,#fbf7ef 0%, #f1ede4 58%, #e9f2ee 100%);
    background-color:#f4f1ea; color:var(--ink);
  }
  .phone.lg .screen{width:336px; height:712px}
  .statusbar{height:34px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:2px 22px 0; font-size:12px; font-weight:800; color:var(--ink); font-family:var(--disp)}
  .statusbar .ri{display:flex; gap:5px; align-items:center; font-size:10.5px}
  .scrollarea{flex:1 1 auto; overflow-y:auto; padding:4px 0 14px}
  .scrollarea::-webkit-scrollbar{width:0}
  .pad{padding:0 15px}
  .phone.lg .pad{padding:0 17px}

  /* screen header (24pt left) */
  .schdr{padding:10px 15px 12px}
  .schdr .sub{font-size:11px; color:var(--muted); font-weight:600}
  .schdr .ttl{font-family:var(--disp); font-weight:900; font-size:23px; color:var(--ink); letter-spacing:-.01em; margin-top:1px; display:flex; align-items:center; justify-content:space-between}
  .schdr .ttl .acts{display:flex; gap:9px}
  .accent{color:var(--teal-deep)}

  /* cards & primitives */
  .card{background:#fff; border:1px solid var(--hair); border-radius:17px; padding:14px; margin:0 15px 12px; box-shadow:0 4px 14px rgba(31,92,84,.06)}
  .phone.lg .card{margin:0 17px 13px}
  .card.tight{padding:12px}
  .row{display:flex; align-items:center; gap:11px}
  .grow{flex:1 1 auto; min-width:0}
  .muted{color:var(--muted)} .small{font-size:11px} .b{font-weight:800}
  .sectlabel{font-family:var(--disp); font-weight:800; font-size:14px; color:var(--teal-deep); margin:4px 15px 9px; display:flex; justify-content:space-between; align-items:center}
  .sectlabel .lnk{font-size:11.5px; font-weight:700; color:var(--teal); font-family:var(--body)}
  .phone.lg .sectlabel{margin:4px 17px 9px}

  /* inline-flex (not flex) so the circle responds to text-align:center on its
     parent — a block-level avatar otherwise left-aligns while the name below it
     centers. In avstacks/rows the .av is a flex item, where this is a no-op. */
  .av{border-radius:999px; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; line-height:1; color:#fff; font-family:var(--disp); font-weight:900; box-shadow:0 2px 6px rgba(0,0,0,.14)}
  .avstack{display:flex} .avstack .av{margin-left:-9px; box-shadow:0 0 0 2.5px #fff} .avstack .av:first-child{margin-left:0}
  .avstack .av.more{background:#cdd9d5!important; color:var(--teal-deep)}

  .pill{font-family:var(--disp); font-weight:800; font-size:11.5px; padding:6px 13px; border-radius:999px; display:inline-flex; align-items:center; gap:5px; white-space:nowrap}
  .pill.teal{background:var(--teal-deep); color:#fff}
  .pill.tealO{background:rgba(61,155,143,.12); color:var(--teal-deep)}
  .pill.terra{background:var(--terra); color:#fff}
  .pill.terraO{background:rgba(198,123,92,.14); color:var(--terra-dark)}
  .pill.ghost{background:rgba(31,92,84,.06); color:var(--teal-deep); border:1px solid var(--hair)}
  .icbtn{width:34px; height:34px; border-radius:999px; background:rgba(31,92,84,.07); display:flex; align-items:center; justify-content:center; color:var(--teal-deep)}

  .progress{height:6px; border-radius:999px; background:rgba(31,92,84,.1); overflow:hidden; margin-top:7px}
  .progress > i{display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--teal),var(--teal-light))}

  /* hero photo card */
  .hero{position:relative; border-radius:20px; overflow:hidden; margin:2px 15px 12px; height:152px; box-shadow:0 8px 22px rgba(31,92,84,.2)}
  .phone.lg .hero{margin:2px 17px 12px; height:166px}
  .hero .bg{position:absolute; inset:0; background:linear-gradient(150deg,#3f8f86,#2d7a70 55%,#1f5c54); }
  .hero .bg.sun{background:linear-gradient(160deg,#e7b770,#cf8f63 45%,#9d6f8c)}
  .hero .veil{position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.34))}
  .hero .hc{position:absolute; inset:0; padding:14px; display:flex; flex-direction:column; justify-content:flex-end; color:#fff}
  .hero .top{position:absolute; top:12px; left:14px; right:12px; display:flex; justify-content:space-between; align-items:flex-start}
  .hero .date{font-size:11px; font-weight:700; opacity:.92}
  .hero .small svg{width:13px; height:13px; flex:0 0 auto}
  .trtile .tloc svg{width:11px; height:11px; flex:0 0 auto}
  .briefpill svg{width:13px; height:13px; flex:0 0 auto}
  .pwfoot svg{width:15px; height:15px; flex:0 0 auto}
  .hero .greet{font-family:var(--disp); font-weight:900; font-size:21px; line-height:1.1; margin-top:2px}
  .hero .greet .nm{color:#bff0e7}

  /* Home hero — full-width daybreak/sandbar PHOTO dissolving into the phone bg,
     greeting overlaid bottom-left, avatar stack top-right. Mirrors the live
     "Calm Home" DashboardView.homeHero (photo masked to transparent at the
     bottom so it melts into the surface). */
  .herohome{position:relative; width:100%; height:210px; overflow:hidden; margin:0 0 4px}
  .herohome .hbg{position:absolute; inset:0; background:var(--hero-img) center 30%/cover no-repeat}
  .herohome .hfade{position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.20) 0%,rgba(0,0,0,0) 22%,rgba(251,247,239,0) 54%,#fbf7ef 100%)}
  .herohome .htop{position:absolute; top:9px; right:16px}
  .herohome .hgreet{position:absolute; left:16px; right:16px; bottom:13px}
  .herohome .hdate{font-size:12px; font-weight:600; color:#5b6c69}
  .herohome .hname{font-family:var(--disp); font-weight:900; font-size:24px; line-height:1.05; color:var(--ink); margin-top:2px}
  .herohome .hname .accent{color:var(--teal-deep)}

  /* brief card */
  .brief{position:relative; border-radius:19px; overflow:hidden; margin:0 15px 12px; box-shadow:0 8px 22px rgba(31,92,84,.16); border:1px solid rgba(255,255,255,.5)}
  .phone.lg .brief{margin:0 17px 12px}
  .brief .bbg{position:absolute; inset:0; background:linear-gradient(155deg,#f4ead5,#eadcc4 50%,#dfeae2)}
  .brief .bin{position:relative; padding:15px 15px 14px}
  .brief .eyb{font-family:var(--disp); font-weight:700; font-size:9.5px; letter-spacing:.13em; color:var(--teal-mid); display:flex; justify-content:space-between; align-items:center}
  .brief .eyb .t{color:var(--muted); font-weight:700; letter-spacing:0; font-family:var(--body)}
  .brief .btitle{font-family:var(--disp); font-weight:900; font-size:16.5px; color:var(--teal-deep); margin:7px 0 9px; line-height:1.15}
  .bul{display:flex; gap:9px; margin-bottom:8px; align-items:flex-start}
  .bul .peb{flex:0 0 auto; width:13px; height:10px; border-radius:48% 52% 50% 50%/55% 50% 50% 45%; margin-top:3px; transform:rotate(-12deg)}
  .bul .bt{font-size:12px; line-height:1.45; color:#2c3e40}
  .bul .bt b{color:#2c3e40; font-weight:700}
  .footroles{margin:12px -3px -2px; padding-top:11px; border-top:1px solid rgba(44,62,64,.12)}
  .footroles .tl{display:flex; align-items:center; gap:9px; font-size:11.5px; color:#2c3e40; padding-bottom:10px; border-bottom:1px solid rgba(44,62,64,.12)}
  .footroles .tl b{font-weight:700}
  .footroles .pillrow{display:flex; justify-content:flex-end; padding-top:11px}
  .briefpill{font-family:var(--disp); font-weight:700; font-size:12px; color:var(--teal-mid); padding:6px 12px; border-radius:999px; background:rgba(255,255,255,.55); border:1px solid rgba(45,122,112,.3); display:inline-flex; align-items:center; gap:5px; backdrop-filter:blur(4px)}
  /* growth pathways radar footer */
  .pwfoot{display:flex; align-items:center; gap:11px; padding:11px 14px; border-top:1px solid rgba(31,92,84,.09)}
  .pwfoot .wt{width:50px; height:42px; border-radius:9px; background:var(--sand-light); border:1px solid var(--hair); flex:0 0 auto}
  .pwfoot .pt{font-family:var(--disp); font-weight:800; font-size:12.5px; color:var(--teal-deep)}
  .pwfoot .ps{font-size:10px; color:var(--muted)}

  /* banners */
  .banner{margin:0 15px 12px; border-radius:15px; padding:13px; display:flex; gap:11px; align-items:flex-start}
  .phone.lg .banner{margin:0 17px 12px}
  .banner.teal{background:rgba(61,155,143,.1); border:1px solid rgba(61,155,143,.26)}
  .banner.terra{background:#f3e7d8; border:1px solid rgba(198,123,92,.28)}
  .banner.purple{background:rgba(139,123,181,.1); border:1px solid rgba(139,123,181,.3)}
  .banner .bi{flex:0 0 auto; width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center}
  .banner.teal .bi{background:rgba(61,155,143,.18); color:var(--teal-deep)}
  .banner.terra .bi{background:rgba(198,123,92,.2); color:var(--terra-dark)}
  .banner.purple .bi{background:rgba(139,123,181,.2); color:#5f5191}
  .banner .bh{font-family:var(--disp); font-weight:900; font-size:13px; color:var(--ink)}
  .banner .bb{font-size:11.5px; color:#4a5a58; line-height:1.45; margin-top:2px}

  /* coming up row */
  .curow{display:flex; align-items:center; gap:11px; padding:10px 0; border-bottom:1px solid var(--hair)}
  .curow:last-child{border-bottom:none}
  .curow .gly{width:34px; height:34px; border-radius:10px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff}
  .curow .ct{font-family:var(--disp); font-weight:800; font-size:13px; color:var(--ink)}
  .curow .cs{font-size:11px; color:var(--muted); margin-top:1px}

  /* later-this-year trip grid */
  .trgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0 15px 12px}
  .phone.lg .trgrid{margin:0 17px 12px}
  .trtile{position:relative; border-radius:15px; overflow:hidden; height:104px; box-shadow:0 5px 14px rgba(31,92,84,.16)}
  .trtile .tv{position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.40))}
  .trtile .tc{position:absolute; inset:0; padding:10px; display:flex; flex-direction:column; justify-content:flex-end; color:#fff}
  .trtile .tt{font-family:var(--disp); font-weight:900; font-size:14px; line-height:1.1}
  .trtile .tloc{font-size:9.5px; opacity:.92; display:flex; align-items:center; gap:3px; margin-top:2px}
  .trtile .tdp{position:absolute; top:8px; left:8px; font-size:8.5px; font-weight:800; background:rgba(0,0,0,.38); color:#fff; padding:2px 7px; border-radius:999px; backdrop-filter:blur(3px)}

  /* domain grid */
  .dgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0 15px 12px}
  .phone.lg .dgrid{margin:0 17px 12px}
  .dtile{border-radius:15px; padding:12px; color:#fff; min-height:74px; display:flex; flex-direction:column; justify-content:space-between}
  .dtile .dn{font-family:var(--disp); font-weight:900; font-size:13.5px}
  .dtile .dc{font-size:10.5px; font-weight:700; opacity:.92}

  /* CTA gradient card */
  .ctacard{margin:0 15px 12px; border-radius:18px; padding:15px; background:linear-gradient(140deg,var(--teal),var(--teal-mid) 60%,var(--teal-deep)); color:#fff; box-shadow:0 10px 24px rgba(31,92,84,.25); position:relative; overflow:hidden}
  .phone.lg .ctacard{margin:0 17px 12px}
  .ctacard .eyb{font-family:var(--disp); font-weight:700; font-size:9.5px; letter-spacing:.13em; opacity:.85}
  .ctacard .ch{font-family:var(--disp); font-weight:900; font-size:17px; margin-top:5px; line-height:1.15; max-width:80%}
  .ctacard .cf{font-size:11.5px; opacity:.9; margin-top:8px; display:flex; align-items:center; gap:6px}

  /* Child hero card (Children tab) — mirrors the live iOS heroCard /
     Portal child-card: playgroundv2 watermark (blurred) + per-child theme
     tint + material wash + right-edge highlight. Per-child tint via inline
     --ktint. Count ("0 of 34") on the right, not a percentage. */
  .kidcard{position:relative; overflow:hidden; border-radius:18px; margin:2px 15px 12px; box-shadow:0 8px 22px rgba(31,92,84,.2)}
  .phone.lg .kidcard{margin:2px 17px 12px}
  .kidcard .kbg{position:absolute; inset:0; background:var(--playground-img) center/cover no-repeat; filter:blur(2px); transform:scale(1.06)}
  .kidcard .ktint{position:absolute; inset:0; background:var(--ktint,#3D9B8F); opacity:.62}
  .kidcard .kwash{position:absolute; inset:0; background:linear-gradient(90deg,transparent 45%,rgba(255,255,255,.10) 78%,rgba(255,255,255,.18) 100%)}
  .kidcard .kc{position:relative; padding:14px; display:flex; align-items:center; gap:14px; color:#fff}
  .kidcard .knm{font-family:var(--disp); font-weight:800; font-size:20px; line-height:1.05}
  .kidcard .kage{font-size:13px; opacity:.92; margin-top:1px}
  .kidcard .kprog{height:5px; border-radius:3px; background:rgba(255,255,255,.3); margin-top:8px; overflow:hidden}
  .kidcard .kprog > i{display:block; height:100%; background:#fff; border-radius:3px}
  .kidcard .kcount{text-align:right; flex:0 0 auto}
  .kidcard .kcount .n{font-family:var(--disp); font-weight:800; font-size:22px; line-height:1}
  .kidcard .kcount .of{font-size:11px; opacity:.92; margin-top:1px}

  /* Review-milestones CTA — the live ReviewMilestonesCTA: teal gradient,
     eyebrow + headline + hairline divider + sparkle footer, with the
     fanned mini-card-stack motif pinned top-right (echoes the swipe deck). */
  .reviewcta{position:relative; overflow:hidden; margin:0 15px 12px; border-radius:20px; padding:17px 18px 15px; background:linear-gradient(135deg,var(--teal),var(--teal-mid) 55%,var(--teal-deep)); box-shadow:0 12px 26px rgba(31,92,84,.3)}
  .phone.lg .reviewcta{margin:0 17px 12px}
  .reviewcta .eyb{display:flex; align-items:center; gap:6px; font-family:var(--disp); font-weight:800; font-size:10px; letter-spacing:.13em; color:rgba(255,255,255,.85)}
  .reviewcta .eyb svg{width:12px; height:12px}
  .reviewcta .rh{font-family:var(--disp); font-weight:900; font-size:21px; color:#fff; line-height:.92; margin-top:7px; max-width:150px}
  .reviewcta .rdiv{height:1px; background:rgba(255,255,255,.18); margin:13px 0 9px}
  .reviewcta .rf{display:flex; align-items:flex-start; gap:6px; font-size:11px; color:rgba(255,255,255,.85); line-height:1.4}
  .reviewcta .rf svg{width:12px; height:12px; flex:0 0 auto; color:var(--teal-light); margin-top:1px}
  .reviewcta .motif{position:absolute; top:0; right:0; width:124px; height:130px; pointer-events:none}
  .reviewcta .motif .mc{position:absolute; width:56px; height:78px; background:#fff; border-radius:11px; box-shadow:0 7px 16px rgba(0,0,0,.18); padding:8px}
  .reviewcta .motif .mc .pill{display:block; height:7px; width:20px; border-radius:4px}
  .reviewcta .motif .mc .ln{height:5px; border-radius:3px; background:#e7e7e7; margin-top:6px}

  /* radar */
  .radarcard{margin:0 15px 12px; border-radius:17px; background:#fff; border:1px solid var(--hair); padding:14px; box-shadow:0 4px 14px rgba(31,92,84,.06)}
  .phone.lg .radarcard{margin:0 17px 12px}

  /* tab bar */
  .tabbar{flex:0 0 auto; height:58px; display:flex; align-items:flex-start; justify-content:space-around; background:rgba(248,245,239,.94); border-top:1px solid var(--hair); backdrop-filter:blur(10px); padding-top:7px; position:relative}
  .tb{display:flex; flex-direction:column; align-items:center; gap:3px; font-size:9px; font-weight:800; color:#9aa9a6; font-family:var(--disp); cursor:pointer; flex:1; transition:.12s; padding-top:2px}
  .tb svg{width:21px; height:21px}
  .tb.act{color:var(--teal-deep)}
  .tb:hover{color:var(--teal-mid)}
  .tb.mid{margin-top:-20px; gap:5px}
  .tb.mid .blob{width:50px; height:50px; border-radius:999px; background:linear-gradient(150deg,var(--teal-light),var(--teal)); display:flex; align-items:center; justify-content:center; color:#fff; box-shadow:0 8px 18px rgba(61,155,143,.45); position:relative}
  .tb.mid .blob svg{width:26px; height:26px}

  /* pebble chat */
  .peblanding{flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 24px; text-align:center}
  .stone{width:96px; height:78px; border-radius:50% 50% 48% 52%/58% 58% 42% 42%; background:radial-gradient(60% 55% at 38% 32%, #c9f3ec, #6cc6b8 55%, #2d8276); box-shadow:0 14px 30px rgba(45,130,118,.4), inset 0 4px 12px rgba(255,255,255,.5); transform:rotate(-8deg); margin-bottom:20px}
  .pebgreet{font-family:var(--disp); font-weight:900; font-size:21px; line-height:1.25}
  .pebgreet .l1{color:var(--teal-deep)} .pebgreet .l2{color:var(--ink)}
  .pebcards{display:flex; flex-direction:column; gap:9px; width:100%; margin-top:22px}
  .pebc{display:flex; align-items:center; gap:11px; background:#fff; border:1px solid var(--hair); border-radius:15px; padding:11px 13px; text-align:left; box-shadow:0 3px 10px rgba(31,92,84,.06)}
  .pebc .pg{width:36px; height:36px; border-radius:11px; display:flex; align-items:center; justify-content:center; color:#fff; flex:0 0 auto}
  .pebc .pt{font-family:var(--disp); font-weight:900; font-size:13.5px; color:var(--ink)}
  .pebc .ps{font-size:11px; color:var(--muted)}
  .pebhdr{padding:9px 15px 10px; border-bottom:1px solid var(--hair)}
  .pebhdr .r1{display:flex; align-items:center; justify-content:space-between}
  .pebhdr .ttl{font-family:var(--disp); font-weight:900; font-size:19px; color:var(--ink); display:flex; align-items:center; gap:6px}
  .pebhdr .quota{font-size:10.5px; color:var(--muted); margin-top:5px}
  .pebhdr .togg{display:flex; gap:6px; margin-top:8px}
  .composer{flex:0 0 auto; padding:9px 13px 11px; border-top:1px solid var(--hair); display:flex; align-items:center; gap:9px}
  .composer .field{flex:1; background:rgba(31,92,84,.06); border-radius:999px; padding:9px 14px; font-size:12px; color:var(--muted)}
  .composer .send{width:36px; height:36px; border-radius:999px; background:var(--teal); color:#fff; display:flex; align-items:center; justify-content:center; flex:0 0 auto}

  /* settings rows */
  .srow{display:flex; align-items:center; gap:12px; padding:13px 14px; background:#fff; border-bottom:1px solid var(--hair)}
  .srow:first-child{border-radius:15px 15px 0 0} .srow:last-child{border-radius:0 0 15px 15px; border-bottom:none}
  .sgrp{margin:0 15px 13px; border-radius:15px; box-shadow:0 4px 14px rgba(31,92,84,.06); border:1px solid var(--hair); overflow:hidden}
  .phone.lg .sgrp{margin:0 17px 13px}
  .srow .si{width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; background:rgba(61,155,143,.12); color:var(--teal-deep)}
  .srow .st{font-family:var(--disp); font-weight:800; font-size:13.5px; color:var(--ink)}
  .srow .ss{font-size:11px; color:var(--muted); margin-top:1px}
  .grouplbl{font-family:var(--disp); font-weight:800; font-size:13px; color:var(--teal-deep); margin:2px 15px 8px}
  .phone.lg .grouplbl{margin:2px 17px 8px}

  /* onboarding */
  .obscreen{flex:1 1 auto; position:relative; display:flex; flex-direction:column}
  .obbg{position:absolute; inset:0; background:linear-gradient(165deg,#7fb6ab,#4f9389 45%,#2d6f66)}
  .obbg.beach{background:linear-gradient(170deg,#9cc6bd 0%,#cdb89a 55%,#b88f6f 100%)}
  .obbg.photo{background:var(--welcome-img) center 32%/cover no-repeat}  /* live iOS welcome-bg */
  .obveil{position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.32))}
  .obwrap{position:relative; flex:1; display:flex; flex-direction:column; padding:22px 18px; z-index:2}
  .obwrap.center{justify-content:center; align-items:center; text-align:center}
  .wordmark{font-family:var(--wordmark); font-weight:400; font-size:54px; letter-spacing:.01em; color:#fff; text-shadow:0 3px 14px rgba(0,0,0,.35)}
  .obbtns{width:100%; display:flex; flex-direction:column; gap:11px; margin-top:auto; padding-top:24px}
  .obbtn{width:100%; padding:13px; border-radius:14px; font-family:var(--disp); font-weight:900; font-size:14px; text-align:center; backdrop-filter:blur(6px)}
  .obbtn.primary{background:rgba(198,123,92,.92); color:#fff}
  .obbtn.glass{background:rgba(255,255,255,.22); color:#fff; border:1px solid rgba(255,255,255,.4)}
  .obbtn.solid{background:var(--teal); color:#fff}
  .obbtn.ghost{background:transparent; color:#fff; font-weight:700}
  .obcard{position:relative; z-index:2; margin:auto 16px; background:rgba(252,250,246,.93); backdrop-filter:blur(8px); border-radius:22px; padding:20px 17px; box-shadow:0 16px 40px rgba(0,0,0,.3); width:calc(100% - 32px)}
  .obh{font-family:var(--disp); font-weight:900; font-size:20px; color:var(--teal-deep); text-align:center; line-height:1.18}
  .obsub{font-size:12px; color:#566; text-align:center; margin-top:7px; line-height:1.5}
  .field2{background:#fff; border:1px solid var(--hair); border-radius:12px; padding:11px 13px; margin-top:11px}
  .field2 .fl{font-size:9.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--muted)}
  .field2 .fv{font-size:13px; color:#9aa9a6; margin-top:3px}
  .stepdots{display:flex; gap:5px; justify-content:center; margin-bottom:12px}
  .stepdots i{height:4px; border-radius:9px; background:rgba(31,92,84,.16); width:26px}
  .stepdots i.on{background:var(--teal)}
  .consent{display:flex; gap:8px; align-items:flex-start; margin-top:12px; font-size:10.5px; color:#566; line-height:1.4}
  .consent .cb{width:17px; height:17px; border-radius:5px; border:1.5px solid var(--teal); flex:0 0 auto; background:var(--teal); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px}
  .orline{display:flex; align-items:center; gap:10px; margin:13px 0 11px; color:var(--muted); font-size:10.5px}
  .orline:before,.orline:after{content:''; flex:1; height:1px; background:var(--hair)}
  .social{display:flex; gap:9px} .social .sb{flex:1; padding:9px; border-radius:11px; border:1px solid var(--hair); background:#fff; text-align:center; font-family:var(--disp); font-weight:800; font-size:13px; color:var(--ink)}
  .obpick{background:#fff; border:1px solid var(--hair); border-radius:14px; padding:13px; margin-top:11px; display:flex; gap:11px; align-items:center}
  .obpick .pt{font-family:var(--disp); font-weight:900; font-size:14px; color:var(--ink)} .obpick .pp{font-size:11px; color:var(--muted); margin-top:2px; line-height:1.4}
  .obcard svg{width:16px; height:16px; flex:0 0 auto}
  .obglyph{width:30px; height:30px; margin:0 auto 6px; color:var(--teal)} .obglyph svg{width:30px; height:30px}
  .obpickic{width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex:0 0 auto} .obpickic svg{width:20px; height:20px}
  .pslot{flex:1; text-align:center} .pslot .pl2{font-size:10.5px; color:var(--muted); margin-top:6px; font-weight:600}
  .reassure{display:flex; gap:9px; align-items:flex-start; background:var(--sand-light); border:1px dashed rgba(31,92,84,.22); border-radius:12px; padding:11px; margin-top:11px}
  .reassure svg{color:var(--teal-mid)} .reassure .rt{font-size:11px; color:#566; line-height:1.45}
  .planrow{display:flex; padding:5px 0} .planrow .pk{flex:1; font-size:11.5px; color:var(--muted)} .planrow .pv{font-size:11.5px; font-weight:800; color:var(--ink)}
  .privrow{display:flex; gap:9px; align-items:flex-start; background:rgba(61,155,143,.08); border:1px solid rgba(61,155,143,.2); border-radius:11px; padding:10px; margin-top:9px}
  .privrow svg{color:var(--teal-deep)} .privrow .pvt{font-size:11px; line-height:1.42; color:#3a4a4a}
  .oblist{display:flex; flex-direction:column; gap:9px; margin-top:13px}
  .bulletrow{display:flex; gap:10px; align-items:flex-start} .bulletrow .bi{width:26px;height:26px;border-radius:8px;background:rgba(61,155,143,.14);color:var(--teal-deep);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .bulletrow .bt{font-family:var(--disp);font-weight:800;font-size:12.5px;color:var(--ink)} .bulletrow .bd{font-size:11px;color:var(--muted);margin-top:1px;line-height:1.4}

  /* ── Redesign: onboarding hero + stepper ── */
  .obstage{display:flex; flex-direction:column; align-items:center; gap:16px}
  .obstepper{display:flex; flex-wrap:wrap; gap:7px; justify-content:center; max-width:1080px}
  .obstep{font-family:var(--disp); font-weight:800; font-size:11.5px; color:#cfe6e1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); border-radius:11px; padding:6px 11px 6px 6px; cursor:pointer; display:flex; align-items:center; gap:7px; transition:.13s}
  .obstep:hover{border-color:var(--teal-light)}
  .obstep .n{font-size:10px; font-weight:900; width:18px; height:18px; border-radius:999px; background:rgba(255,255,255,.16); color:#eafffb; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
  .obstep.on{background:var(--teal-light); color:#0f322d; border-color:var(--teal-light)}
  .obstep.on .n{background:#0f322d; color:var(--teal-light)}
  .obstep.done{opacity:.6}
  .obnav{display:flex; gap:12px; align-items:center}
  .obnav button{font-family:var(--disp); font-weight:800; font-size:13px; color:#0f322d; background:var(--teal-light); border:none; border-radius:11px; padding:9px 18px; cursor:pointer; transition:.13s}
  .obnav button:hover:not(:disabled){background:#fff}
  .obnav button:disabled{opacity:.32; cursor:default}
  .obnav .ctr{font-family:var(--disp); font-weight:800; font-size:12.5px; color:#eafffb; min-width:150px; text-align:center}
  /* Portal onboarding: reuse the onboarding screen markup, framed as a
     desktop browser. The dusk obbg fills the wide viewport; the obcard
     is constrained to a wizard-width column + centered. */
  .pw-obapp{min-height:624px; padding:0; display:block}
  .pw-obapp .obscreen{min-height:624px}
  .pw-obapp .obcard{max-width:452px; width:calc(100% - 56px); margin-left:auto; margin-right:auto}
  .pw-obapp .obwrap{max-width:452px; margin-left:auto; margin-right:auto}
  /* The whole Portal onboarding flow rides the Daybreak wallpaper (the live
     Portal serves it on register AND wizard routes), so it stays coherent from
     the welcome onward instead of jumping to a dusk gradient. Each step's own
     dusk/beach .obbg goes transparent and the dark veil is dropped — the near-
     opaque onboarding card carries its own contrast on the light wallpaper.
     (.pw-app.pw-obapp beats the .pw-app cream gradient regardless of order.) */
  .pw-app.pw-obapp{background:var(--daybreak-img) center/cover no-repeat}
  .pw-obapp .obbg:not(.daybreak){background:transparent}
  .pw-obapp .obveil{display:none}

  /* Portal pre-registration welcome — the live register-screen.js look:
     the Daybreak wallpaper fills the frame, a centered brand block
     (cairn stone mark + Ponari "PebblePath" + "WEB PORTAL" companion)
     floats above a white frosted glass panel with the two CTAs. Mirrors
     glass-panel(strong+lifted) + frost-teal / frost-neutral buttons. */
  .obbg.daybreak{background:var(--daybreak-img) center/cover no-repeat}
  .pww{position:relative; z-index:2; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:44px 24px}
  .pwwbrand{display:flex; flex-direction:column; align-items:center; gap:13px}
  .pwwbrand .row{display:flex; align-items:center; gap:12px}
  .pwwbrand .ic{width:54px; height:54px; border-radius:14px; background:var(--cairn-icon) center/cover; box-shadow:0 6px 24px rgba(0,0,0,.3); flex:0 0 auto}
  .pwwbrand .nm{font-family:var(--wordmark); font-weight:400; font-size:44px; line-height:1; letter-spacing:.02em; color:var(--teal); text-shadow:0 1px 3px rgba(255,255,255,.5); transform:translateY(4px)}
  .pwwbrand .companion{font-family:var(--disp); font-weight:700; font-size:12.5px; letter-spacing:.17em; text-transform:uppercase; color:var(--teal); display:flex; align-items:center; gap:12px}
  .pwwbrand .companion:before,.pwwbrand .companion:after{content:''; width:24px; height:1px; background:var(--teal); opacity:.55}
  .pwwcard{width:100%; max-width:392px; background:rgba(255,255,255,.72); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px); border:1px solid rgba(44,62,64,.2); border-radius:24px; padding:26px 30px 28px; box-shadow:0 26px 60px rgba(8,30,27,.3); text-align:center}
  .pwwcard .h1{font-family:var(--disp); font-weight:700; font-size:22px; letter-spacing:-.02em; color:var(--teal); margin-bottom:6px}
  .pwwcard .lede{font-size:14.5px; line-height:1.5; color:var(--teal); opacity:.82; margin-bottom:18px}
  .pwwcard .btns{display:flex; flex-direction:column; gap:10px; align-items:center}
  .pwwbtn{width:248px; max-width:100%; padding:12px; border-radius:999px; font-family:var(--disp); font-weight:800; font-size:15px; text-align:center}
  .pwwbtn.teal{background:rgba(124,186,175,.88); color:#fff; border:1px solid rgba(255,255,255,.4); text-shadow:0 1px 2px rgba(20,12,6,.34); box-shadow:0 8px 22px rgba(61,155,143,.26), inset 0 1px 0 rgba(255,255,255,.3)}
  .pwwbtn.neutral{background:rgba(74,70,66,.46); color:#fff; border:1px solid rgba(255,255,255,.28); text-shadow:0 1px 2px rgba(20,12,6,.4); box-shadow:0 6px 18px rgba(20,12,6,.2), inset 0 1px 0 rgba(255,255,255,.16)}

  .empty{padding:50px 22px; text-align:center; color:var(--muted)}
  .empty .ei{width:56px;height:56px;border-radius:16px;background:rgba(61,155,143,.1);color:var(--teal);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .empty h3{font-family:var(--disp);font-weight:900;font-size:16px;color:var(--ink)} .empty p{font-size:12px;margin-top:6px;line-height:1.5}

  /* ── Matrix ── */
  .mxwrap{overflow:auto; background:#fff; border:1px solid var(--hair); border-radius:14px; max-height:80vh; box-shadow:var(--shadow)}
  table.mx{border-collapse:collapse; width:100%; font-size:11.5px; color:var(--ink)}
  table.mx th,table.mx td{padding:6px 9px; border-bottom:1px solid var(--hair); text-align:left; vertical-align:top}
  table.mx thead th{position:sticky; top:0; background:var(--teal-deep); color:#fff; font-family:var(--disp); font-weight:800; z-index:2; font-size:11px}
  table.mx thead th.pcol{text-align:center; width:52px}
  table.mx tr.grp td{background:var(--sand-light); font-family:var(--disp); font-weight:900; color:var(--teal-deep); position:sticky; left:0}
  table.mx td.sec{font-weight:600; max-width:280px}
  table.mx td.scr{color:var(--muted); font-size:10.5px; max-width:160px}
  table.mx td.cell{text-align:center; font-weight:900}
  .yes{color:var(--teal)} .no{color:#d8d2c6}

  /* ── Findings ── */
  .findwrap{display:flex; flex-direction:column; gap:18px; max-width:1040px}
  .panel{background:#fff; border:1px solid var(--hair); border-radius:16px; padding:20px 22px; box-shadow:var(--shadow); color:var(--ink)}
  .panel h2{font-size:17px; font-weight:900; color:var(--teal-deep)}
  .panel h3{font-size:13.5px; font-weight:800; color:var(--teal-mid); margin:14px 0 6px}
  .hl{display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--hair)}
  .hl:last-child{border-bottom:none}
  .hl .n{font-family:var(--disp); font-weight:900; color:#fff; background:var(--terra); min-width:25px; height:25px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:12px}
  .hl .bd{font-size:13px; line-height:1.55}
  .hl .tag{font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; padding:1px 7px; border-radius:5px; margin-left:6px; background:rgba(61,155,143,.14); color:var(--teal-deep)}
  .gaparea .ga{font-family:var(--disp); font-weight:800; color:var(--teal-deep); font-size:12.5px; margin:12px 0 4px}
  .gaparea ol{margin:0; padding-left:20px} .gaparea li{font-size:12px; line-height:1.5; margin-bottom:5px}
  .logic{font-size:12px; line-height:1.6; white-space:pre-wrap; font-family:var(--body)}
  .logic code{font-family:ui-monospace,monospace; font-size:11px; background:var(--sand-light); padding:1px 4px; border-radius:4px}
  .legendp{font-size:11.5px; color:var(--muted); margin:2px 0 0; line-height:1.5}
  code{font-family:ui-monospace,monospace; font-size:11px; background:var(--sand-light); padding:1px 4px; border-radius:4px}
  .panel.statusbanner{background:linear-gradient(150deg,#eafaf6,#fff); border-color:rgba(61,155,143,.32); font-size:13px; line-height:1.55; color:var(--ink); padding:15px 18px}
  .panel.statusbanner b{color:var(--teal-deep)}
  .bd.openlead b{color:var(--terra-dark)}
  .donelist{display:grid; grid-template-columns:1fr 1fr; gap:7px 20px; margin-top:2px}
  .doneitem{display:flex; gap:8px; align-items:flex-start; font-size:12px; line-height:1.45; color:#46514f}
  .doneitem .dk{flex:0 0 auto; color:var(--teal); margin-top:1px} .doneitem .dk svg{width:15px; height:15px}
  .doneitem code{font-size:10.5px}
  .refitem{font-size:12.5px; line-height:1.55; color:var(--ink); padding:8px 0; border-bottom:1px solid var(--hair)}
  .refitem:last-child{border-bottom:none}

  /* ── Family Circle view ── */
  .circlewrap{display:flex; gap:26px; flex-wrap:wrap; align-items:flex-start}
  .ringcard{background:rgba(252,250,246,.96); border-radius:24px; padding:18px 18px 14px; width:404px; flex:0 0 auto; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,.5)}
  .ringstage{position:relative; width:368px; height:344px; margin:0 auto}
  .ringguide{position:absolute; border-radius:999px; left:50%; top:50%; transform:translate(-50%,-50%)}
  .ringguide.fam{border:1.5px solid rgba(31,92,84,.28)}
  .ringguide.con{border:1.5px dashed rgba(198,123,92,.42)}
  .rnode{position:absolute; transform:translate(-50%,-50%); width:72px; text-align:center}
  .rnode .nl{font-family:var(--disp); font-weight:800; font-size:11px; color:var(--ink); margin-top:4px; line-height:1.05}
  .rnode .nr{font-size:8.5px; color:var(--muted); margin-top:1px}
  .rnode.child .av{box-shadow:0 0 0 2.5px rgba(61,155,143,.5)}
  .rnode.you .av{box-shadow:0 0 0 3px var(--motor)}
  .rnode.you .nl{color:var(--teal-deep)}
  .ringempty{position:absolute; left:50%; top:62%; transform:translate(-50%,-50%); width:230px; text-align:center; color:var(--muted); font-size:11.5px; line-height:1.5}
  .clegend{margin-top:6px; border-top:1px solid var(--hair); padding-top:11px; display:flex; flex-direction:column; gap:8px}
  .clrow{display:flex; gap:9px; align-items:flex-start}
  .cldot{width:13px; height:13px; border-radius:999px; flex:0 0 auto; margin-top:2px}
  .clrow .clt{font-family:var(--disp); font-weight:800; font-size:11.5px; color:var(--ink)} .clrow .cld{font-size:10.5px; color:var(--muted); line-height:1.35}
  .cpanel{flex:1 1 300px; min-width:280px; display:flex; flex-direction:column; gap:16px}
  .croster{background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:14px 16px}
  .croster h4{font-size:13px; font-weight:800; color:#eafffb; margin-bottom:10px}
  .crrow{display:flex; align-items:center; gap:11px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.08)}
  .crrow:last-child{border-bottom:none}
  .crrow .cn{font-family:var(--disp); font-weight:700; font-size:13px; color:#eafffb}
  .crrow .cm{font-size:10.5px; color:#9cc1ba}
  .crrow .ybadge{font-size:8.5px; font-weight:800; background:rgba(92,191,176,.25); color:#bff0e7; padding:1px 7px; border-radius:6px}
  .crrow .grantpill{margin-left:auto; font-size:9.5px; font-weight:800; background:rgba(92,191,176,.18); color:#bff0e7; padding:3px 9px; border-radius:999px}
  .cnote{background:rgba(198,123,92,.14); border:1px solid rgba(198,123,92,.3); border-radius:14px; padding:13px 15px; font-size:12.5px; line-height:1.55; color:#f3d9cb}
  .cnote b{color:#fff}
  .cnote.teal{background:rgba(92,191,176,.12); border-color:rgba(92,191,176,.3); color:#cfeee8}

  /* ════════════════ Portal (web) view ════════════════ */
  .pw-browser{max-width:1180px; margin:0 auto; border-radius:16px; overflow:hidden; box-shadow:0 30px 70px rgba(8,30,27,.45), inset 0 0 0 1px rgba(255,255,255,.06)}
  .pw-chrome{display:flex; align-items:center; gap:11px; padding:10px 14px; background:#16302c; border-bottom:1px solid rgba(255,255,255,.06)}
  .pw-dots{display:flex; gap:6px}
  .pw-dots span{width:11px; height:11px; border-radius:999px; background:#e06c5b}
