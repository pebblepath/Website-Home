"notes":"Persona-agnostic empty state."},{"name":"Footer note","exactCopy":"Showing the most recent {app.auditLogs.count} actions. Entries are written automatically when sensitive changes happen and can't be edited or deleted by anyone.","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"only when !app.auditLogs.isEmpty (rendered below the Recent activity list, not in the empty state)","notes":"Spec captures the Recent-activity list + Empty state but omits this footer note. All personas reach this screen (no viewerIsParent gate anywhere on the Security row, the Activity row inside it, or this view). [evidence: SettingsActivityLogView.swift:40-43,137-139]"}]},"settingsrolesview-daily-roles-routines":{"id":"settingsrolesview-daily-roles-routines","group":"settings","area":"settings-tab","name":"SettingsRolesView (Daily roles & routines)","filePath":"/Users/thomasparis/Desktop/PebblePath/ios/PebblePath/PebblePath/Screens/Settings/SettingsRolesView.swift","purpose":"Coordination roles board — who usually does each routine. Reached from Memory (parent-gated entry).","appearsForPersonas":["P1","P2","P3"],"orderHint":"n/a","sections":[{"name":"intro","exactCopy":"\"Pebble fills these in from your routine. Set who usually does each, Home handles the day's swaps.\"","visibleToPersonas":["P1","P2","P3"],"condition":"always (screen reachable only via the parent-gated usualRoutinesEntry in Memory)","notes":"In practice parent-only because the entry that pushes it is gated on viewerIsParent. The screen has no internal persona guard."},{"name":"Role tiles grid","exactCopy":"Per role: RoleTile (routine name + usual-owner avatars). Tap cycles usual owner. Long-press context menu: \"Remove routine\".","visibleToPersonas":["P1","P2","P3"],"condition":"ForEach(app.coordinationRoles)","notes":"Seeded defaults via seedDefaultCoordinationRolesIfNeeded."},{"name":"addRow + AddCustomRoleSheet","exactCopy":"\"Add a routine\". Sheet: \"Name the routine, like Lunch, Homework or Daycare. Set who's on it after.\" / placeholder \"Routine name\" / title \"New routine\" / buttons \"Cancel\" / \"Add\".","visibleToPersonas":["P1","P2","P3"],"condition":"always","notes":"Custom roles use the standard pebble icon."}]},"packingtemplateeditview":{"id":"packingtemplateeditview","group":"settings","area":"settings-tab","name":"PackingTemplateEditView","filePath":"/Users/thomasparis/Desktop/PebblePath/ios/PebblePath/PebblePath/Screens/Settings/PackingTemplateEditView.swift","purpose":"Full-screen edit view for a single PackingTemplate. Pushed from PackingTemplatesView (My packing lists) via NavigationLink(value: template.id), and also reachable from PackingListView's 'Save as new template'. Lets the user rename the list, change its icon, add/rename/remove groups, add/edit/delete items, and delete the whole list. The spec covers PackingTemplatesView (the list landing) but NOT this editor, which is the destination users actually spend time in. Reachable by all personas who reach 'What Pebble knows' (no viewerIsParent gate on the packing entry).","appearsForPersonas":["P1","P2","P3","P4","P5","P6","P7"],"orderHint":"added by completeness pass","sections":[{"name":"metaHeader — name + icon","exactCopy":"Icon menu options via PackingTemplateIcon.allCases; name field placeholder \"List name\". Tap the icon tile (with a pencil.circle.fill badge) opens a Menu of icon choices.","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"always","notes":"navigationTitle renders the live draft.name. NameField commits on submit OR focus-loss."},{"name":"groupCard — per-group items + add-item row","exactCopy":"Per item: PackingItemRow (templateEditor mode). Add-item field placeholder \"Add to {group.name}\".","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"ForEach($draft.groups)","notes":"renameGroup currently appends ' (rename)' suffix (v1 placeholder per code comment — proper inline rename deferred)."},{"name":"addGroupButton","exactCopy":"\"Add another list\"","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"always","notes":"Opens AddPackingGroupSheet."},{"name":"deleteButton + confirm alert","exactCopy":"Button \"Delete this list\". Alert title \"Delete this list?\", message \"Trips that used this list keep their copy. Only this saved list goes away.\", buttons \"Delete\" / \"Cancel\".","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"always","notes":""},{"name":"AddPackingGroupSheet (presented from this view)","exactCopy":"Body text \"Add another list for someone joining the trip.\". Field placeholder \"e.g. Grandma\". Duplicate warning \"That name is already used.\". Nav title \"New list\". Toolbar buttons \"Cancel\" / \"Add\".","visibleToPersonas":["P1","P2","P3","P4","P5","P6","P7"],"condition":"showAddGroup; struct lives in Components/PackingListSheets.swift:236 but is only presented from PackingTemplateEditView within the Settings flow","notes":"Toolbar Done button on the parent editor dismisses. Toolbar \"Add\" disabled when trimmed empty OR duplicate."}]}},"logic":"The `children` array is populated directly from `childrenListener(familyId:)` — meaning it reflects whatever Firestore rules permit the user to read. This is the critical finding for distinguishing P4 vs P5 vs P6. I now have everything needed to write the complete logic map.\n\n---\n\n# iOS Persona Classification — Runtime Logic Map\n\n## How the app classifies the signed-in user\n\nThere is **no single `persona` enum**. Persona is computed on the fly from two boolean accessors plus the data state of `children` / `currentFamily`. Both live in `AppState.swift`:\n\n- **`viewerIsParent`** — `AppState.swift:763-766`\n  ```swift\n  var viewerIsParent: Bool {\n      guard let uid = currentUser?.id else { return false }\n      return children.contains { ($0.parentIds ?? []).contains(uid) }\n  }\n  ```\n  True iff the signed-in uid appears in `Child.parentIds` of **any** child currently loaded in the `children` array.\n\n- **`viewerIsChildViewer`** — `AppState.swift:780-783`\n  ```swift\n  var viewerIsChildViewer: Bool {\n      guard let uid = currentUser?.id, !viewerIsParent else { return false }\n      return (currentFamily?.childViewers ?? []).contains(uid)\n  }\n  ```\n  True iff uid ∈ `currentFamily.childViewers` **and** the user is not already a parent.\n\nSupporting accessors: `parentedChildIds` (`AppState+Memory.swift:35-40`, the per-uid filtered child-id list), `familyRoster` (`AppState.swift:798-851`), `familyCircle` (`AppState.swift:863-899`), `connectedFamilies` (stored, `AppState.swift:280`; refreshed from `currentFamily.connectedFamilyIds` in `AppState+Family.swift:802`).\n\n## Precedence / mutual exclusion\n\nStrict priority: **parent > viewer > plain non-parent**, enforced in two places:\n\n1. The guard `!viewerIsParent` inside `viewerIsChildViewer` (`AppState.swift:781`) forces viewer to **false** whenever the user is a parent. A parent who is *also* in `childViewers` still classifies as parent.\n2. The view-layer branch order is identical everywhere — `DashboardView.swift:52-58` and `ChildrenView.swift:71-73`:\n   ```swift\n   if app.viewerIsParent { … }            // P1/P2/P3\n   else if app.viewerIsChildViewer { … }  // P5\n   else { … }                             // P4/P6/P7 (NonParent)\n   ```\n\nSo at the **code-branch level there are exactly 3 branches**: parent / viewer / non-parent.\n\n## Per-persona selection conditions\n\n- **P1 Parent.1child** — `viewerIsParent == true` (`AppState.swift:765`) AND `children.count == 1`. Hits the parent branch. Multi-child surfaces self-suppress on `children.count <= 1` (e.g. `DashboardView.swift:475`, `ChildrenView.swift:331/792`, carousel guard `DashboardView.swift:596`).\n\n- **P2 Parent.2plus** — `viewerIsParent == true` AND `children.count >= 2`. Same parent branch; the only thing that distinguishes P2 from P1 is the **data-driven `children.count` gate**, not a separate code path. Triggers: family-scope Family Brief (`AppState+Brief.swift:290` `guard children.count >= 2`), child carousel / switcher (`ChildrenView.swift:331`), capture-gate fair rotation (`AppState+Memory.swift:213`), Anchor/Rhythm \"pick a child\" empty state (`AnchorEditSheet.swift:59/176`, `RhythmEditSheet.swift:59/197`).\n\n- **P3 CoParentJoiner** — `viewerIsParent == true` (uid is in some child's `parentIds`). **Post-registration UI is byte-identical to P1/P2** — there is no runtime flag that says \"I joined vs I created.\" The only divergence is in the **onboarding router** (`onboardingPhase`, `AppState.swift:921-963`), which steers a `cairnFamilyId`-but-no-`familyId` user through `.cairnConnection` / the 2A claim flow (`connectOnboardingComplete`, lines 955-961) and skips create-family/location/add-child. Once they parent a child, `viewerIsParent` flips true and they are indistinguishable from any other parent.\n\n- **P4 NonParentMember** — falls through to the **non-parent branch**: `viewerIsParent == false` AND `viewerIsChildViewer == false`. The discriminator \"the family *has* children this user can't see\" is **not directly computable on iOS**: `children` is populated straight from `childrenListener(familyId:)` (`AppState+Listeners.swift:54`, `:452`) which only returns docs Firestore rules permit. A non-parent's rules deny child docs, so `children` is empty for them too — **same in-memory state as P6**.\n\n- **P5 ReadOnlyViewer** — `viewerIsChildViewer == true` (`AppState.swift:782`), which requires `viewerIsParent == false` first. Only persona to hit the `ViewerHomeView()` / `viewerChildren` branch. Note: a read-only viewer's `children` array *can* be non-empty (childViewer Firestore rules grant child read), so for P5 `children` may be populated while `viewerIsParent` is still false.\n\n- **P6 SoloChildless** — non-parent branch (`viewerIsParent == false`, `viewerIsChildViewer == false`), same as P4. Intended distinction is \"the family itself has zero children.\" On iOS this would mean `children.isEmpty` — but `children.isEmpty` is *also* true for P4 (rules-denied reads). **Not distinguishable from P4 at runtime.**\n\n- **P7 ConnectedMember** — non-parent branch as well, *unless* the user is independently a parent in their home family (then parent branch). The connected-family signal is `currentFamily.connectedFamilyIds` → `connectedFamilies` (`AppState+Family.swift:802`, `AppState.swift:280`). This is **display-only** and feeds the Family screen's ring; it is **not folded into any persona predicate**. Cross-family activity co-visibility is handled at the data layer (`visibleTo` on activities; `connectionMemberIds` is always `[]` on iOS authoring — `AppState+Activities.swift:58-59,94-97`), never via a persona branch.\n\n## Findings — personas the iOS code CANNOT distinguish\n\n1. **P4 (NonParentMember) vs P6 (SoloChildless) are indistinguishable at runtime.** Both resolve to `viewerIsParent == false && viewerIsChildViewer == false` and both have `children.isEmpty` (P4 because rules deny the family's child docs; P6 because the family genuinely has none). There is no accessor that knows \"the family has hidden children.\" Both render the identical `NonParentHomeView()` / `nonParentChildren` branch. To tell them apart you'd need a family-level child *count* independent of read-permission (e.g. a denormalized `Family.childCount`), which does not exist.\n\n2. **P7 (ConnectedMember) has no persona branch at all.** A connected member who is a parent in their own family hits the parent branch; a connected member who is a non-parent hits the same non-parent branch as P4/P6. `connectedFamilyIds`/`connectedFamilies` never participates in `viewerIsParent` or `viewerIsChildViewer`. P7 is purely a *data* distinction surfaced in the Family circle ring + the activities `visibleTo` layer — the persona system does not model it.\n\n3. **P1 vs P2 and P1/P2 vs P3 are not separate code branches** — P1/P2 differ only by the `children.count` data gate, and P3 is identical to P1/P2 post-onboarding (the join-vs-create distinction exists only transiently in `onboardingPhase`, `AppState.swift:921-963`, and leaves no persistent runtime persona marker).\n\nNet: the iOS runtime collapses the 7 personas into **3 branches** (parent / viewer / non-parent), with P1/P2/P3 sharing the parent branch (split only by `children.count` and onboarding path) and **P4/P6/P7-non-parent all collapsing into one indistinguishable non-parent branch**.","gaps":[{"area":"onboarding-auth-family","items":["Em-dash violations of the project-wide no-em-dash rule appear in onboarding copy: SignInView password-reset confirmation ('— there's no password to reset'), FamilySetup .picking subtitle ('shared space — everyone'), FamilySetup .creating subtitle ('a name — you can rename'), LocationSetup 'Use my location' subtitle ('Quickest — we'll'). Confirm with Thomas whether these should be fixed for the mockup or are known-acceptable.","Persona mapping for the create-vs-join split is inferred from the onboardingPhase logic + data shape, NOT from distinct code branches in these views — every persona SEES both FamilySetup picker cards; the branch is which card they tap. I attributed create-form sections to P1/P2/P6/P7 and join-form to P3/P4/P5/P7 based on the persona definitions (who joins an existing family). Confirm P7 (ConnectedMember) is expected to traverse the JOIN path (joining a family that then becomes connected) rather than the create path — the code doesn't distinguish.","CairnConnectionView is the Portal-first (web-first) onboarding branch and is arguably 'second half' adjacent, but it IS the iOS family-setup/join surface for P3/P4/P5/P6/P7 who started on Portal — I included it fully. Confirm it belongs in this audit area vs. the second-half audit.","P5 (ReadOnlyViewer) does NOT have a distinct onboarding screen: a viewer is created by a parent granting access AFTER the person has joined as a flat member. So P5's onboarding path is identical to P4's (join as flat member via FamilySetup-join or CairnConnection lander); the read-only status is conferred later, post-onboarding. Confirm this is the intended model (no viewer-specific onboarding copy exists).","The OnboardingStepIndicator total/step counts assume the create-family path (3 steps) — for joiners FamilySetup collapses to 2, but CreateAccountView always hard-codes step:1 of 3 and SignInView shows none. A Portal-first joiner going through CairnConnection sees no step indicator at all on that screen. Flag if the mockup needs consistent step-count treatment across personas."]},{"area":"onboarding-children-router","items":["P5 (ReadOnlyViewer) has NO distinct onboarding path. Read-only access (uid ∈ family.childViewers) is granted by a parent LATER, in Settings (P11 'Grant access' / 2A-approve), not during onboarding. During onboarding P5 is indistinguishable from P4 (non-parent member): they go signedOut → needsFamily(join) → cairnConnection(lander or '2A No') → needsNotifications → ready, all as a non-parent. So in this onboarding area P5 == P4 everywhere. Confirm with Thomas that the mockup should treat them identically here.","P7 (ConnectedMember) has NO distinct onboarding path either. connectedFamilyIds is populated by a cross-family connect action AFTER a user already has their own family; it is never set during the onboarding sequence captured here. P7 reaches .ready via the P1/P2 (parent) or P6 (solo childless) own-family onboarding path. I tagged P7 onto the notification-permission parent/non-parent variants according to whether they parent a child in their own family. Confirm the mockup doesn't expect a P7-specific onboarding screen.","P3 (CoParentJoiner) routing nuance worth flagging in the mockup: invite-code redemption (FamilySetupView 'I have an invite code' → app.redeemConnectCode) does NOT set the user's familyId — it adds them to cairnMemberIds. So the joiner does NOT skip straight to .needsNotifications; instead onboardingPhase routes them to .cairnConnection, where the 2A parent-claim prompt is the surface that distinguishes P3 (taps a child to claim) from P4 (taps 'No'). A freshly-claimed P3 enters the app as a NON-PARENT (viewerIsParent=false) and is upgraded to the parent persona only after an existing parent approves the claim (P3-1 self-heal on next sign-in). Therefore P3's NotificationPermissionView copy is the NON-PARENT variant at first-run if their claim hasn't been approved yet, and the PARENT variant only on a later sign-in post-approval.","CairnConnectionView.optInContent (own-household Category-C opt-in) is reached only by a web/Portal-first user who CREATED their own family with no other members. That doesn't map cleanly to any of P1-P7 as defined (it's a pre-iOS-app creator). I left its visibleToPersonas empty and noted it. If the mockup needs to cover the web-first-creator case, it's a distinct eighth situation.","FamilySetupView itself was assigned to the FIRST-half area (per the area split), so I did not enumerate its sections — but its 'I have an invite code' → redeemConnectCode behavior is load-bearing for P3/P4/P5's path INTO CairnConnectionView. Flagging so the first-half audit and this one stay consistent on that handoff.","The additional-child AddChild flow (Settings → 'Add another child', isAdditionalChild=true) is technically out of onboarding scope but shares the AddChildView file. I documented its step-4 1-slot variant and the skipped children-question; the wizard steps 1/2/3/5 copy is identical to onboarding. Confirm whether the mockup wants the Settings-entry variant treated separately."]},{"area":"home-dashboard-tab","items":["EXPERIMENT FLAG: DashboardView.familyBriefHeroTest is hardcoded `true` (line 42). With it true, parents see FamilyBriefHeroCard and the original ChildCardView (childSection) + ProactivePebbleCard + FamilyProactivePebbleCard are ALL hidden. If Thomas intends the mockup to reflect the OLD child-card layout instead, the flag must be flipped — I mapped the CURRENT (flag=true) state as primary and documented the gated-off alternates. Confirm which layout the mockup should target.","Family Brief eyebrow always reads \"FAMILY BRIEF\" even for a single-child family (P1/P3) where the card content is the per-child brief (app.dailyCard). Verify this is intended copy for single-child personas, or whether the mockup should show a per-child eyebrow there.","P7 ConnectedMember: the Home branch is determined purely by viewerIsParent/viewerIsChildViewer within the CURRENT family context — connectedFamilyIds itself doesn't change the Home layout. A P7 user is shown via whichever of the 3 branches matches their role in their active family (most likely NonParentHomeView). Cross-family co-visibility shows up only through trips/events/activities in FamilyComingUpSection (visibleTo-scoped); confirm the mockup should depict P7 as a non-parent Home with cross-family activities in the Upcoming list.","P6 SoloChildless vs P4 NonParentMember render the SAME NonParentHomeView; the only difference is data (P6 family has zero children → privacyBanner hidden + empty activities; P4 family has children → privacyBanner shown). No separate code branch.","CaptureGatePrompt, PackingDashboardCard, the coordination footer, and the advisorTeaser are all surfaced at most occasionally / conditionally (capture gate = ≤1/day and only when a gap exists; packing = only 0–7 days before a trip; coordination swap line = only when a role is overridden today). A mockup should treat them as conditional, not always-on, surfaces."]},{"area":"children-tab","items":["The Milestone areas grid (DomainGrid) is COMMENTED OUT in the parent branch as of 2026-06-14 — parents currently see NO on-screen 'Milestone areas' tiles or 'See all' entry. The drilldown to MilestonesView is therefore only reachable via external deep links (app.jumpToMilestones / pendingMilestonesDrilldown from Dashboard). Confirm whether the mockup should show this section (it is one uncommented line away from being live) or omit it.","P5 (read-only viewer) InsightsPreview still renders a tappable 'Refresh' button that calls app.refreshInsights() — there is no read-only guard on the refresh action in the viewer branch (only the structural surfaces like swipe deck / Tips / export are withheld). May be intentional (rules-gated server-side) or an oversight; flagging for the review.","Per-child 'Request access' and 'Pending' states are an APPROXIMATION: childViewers is family-level, so all per-child pills share one session-wide requestedAccess flag (tapping any child marks ALL as 'Pending'). The /17 mock implies per-child state. Confirm the mockup should reflect the current shared-state behavior, not true per-child state.","P7 (ConnectedMember): the connected family's children are never loaded into app.children (the children listener is keyed to the user's single resolved home family). So in their OWN family P7 sees the non-parent branch identical to P4 (children present) or P6 (childless). P7's cross-family child invisibility is enforced by NOT listening to the connected family's /children at all — there is no Children-tab surface that shows connected-family children. Confirm this is the intended/correct behavior for the audit (i.e., the Children tab has no P7-specific content).","Growth Pathways radar vs empty nudge is data-driven (hasArcData = any milestone has a non-nil arc). Children created before the Method reseed show the 'Pathways need milestone data' nudge instead of the radar. The mockup should likely show the populated radar for a fresh/realistic child, but the empty-nudge variant exists for legacy children.","The hero card's inline name-Menu switcher (chevron.down) appears whenever app.children.count >= 2 — this is true in BOTH the parent branch (P2) AND the viewer branch (P5 multi-child), and in the viewer branch it stacks with the separate childSwitcher pill above. Possible redundancy in the viewer multi-child case worth flagging."]},{"area":"pebble-tab","items":["The Pebble tab and the prominent middle Pebble tab button (CustomTabBar) are rendered for ALL personas — there is no per-persona tab hiding. Non-parents (P4/P6/P7) and the read-only viewer (P5) tapping the Pebble tab land on the identical locked state ('Pebble stays with a child's parents'). Confirm the mockup should depict the locked state as the Pebble experience for P4/P5/P6/P7 (they all share it; P5 is NOT given a viewer-specific variant here).","The middle Pebble tab button's 0.5s long-press (voice capture) gesture is technically present for all personas on the tab bar, but startVoiceCapture() aborts for anyone without a selected child ('Pick a child before asking Pebble.'). For non-parents/viewers this is unreachable in practice (no selectable child). Worth confirming whether the mockup should show the prominent middle Pebble button at all for non-parent personas, since tapping it just shows the locked screen.","AdvisorView itself has NO multi-child UI (no carousel/switcher). For P2 (2+ children) the chat is scoped to the currently-selected child (selected elsewhere — Home/Children tab). The child name appears via interpolation (composer placeholder, Activity-ideas card question, Clear alert). So P1 vs P2 differ only by which child is active, not by any P2-specific section on this tab. Confirm that's the intended treatment for the mockup.","P3 (CoParentJoiner) is byte-identical to P1/P2 post-registration on the Pebble tab — no joiner-specific copy. The Family/Private toggle is the only surface where having a co-parent is functionally meaningful (private mode hides messages from the co-parent).","Quota is FAMILY-shared (5/week across both parents), and the limit-reached copy explicitly says 'Both parents share the same 5-question pool.' For a solo parent (P1 with no co-parent joined) this 'both parents' wording is slightly off but still renders — flag if copy should adapt to solo families."]},{"area":"activities-tab","items":["Weekend planner ('My Weekend' → FamilyPlanGeneratorView) is NOT persona-gated, unlike the Pebble chat tab which is parent-only. Non-parents (P4), read-only viewers (P5), childless solo users (P6), and connections (P7) can all open it and tap 'Plan our weekend with Pebble' even though the copy says 'ideas your kids will love'. Confirm intended, and confirm the generateFamilyPlan Cloud Function's behavior for a childless / non-parent caller (error, generic ideas, or leak?).","CHILD-DATA EXPOSURE TO NON-PARENTS (by design, but flag): /children DOC read rule is `allow read: if isCairnMember(familyId)` (comment: 'the extended ring sees WHO the kids are — name, DOB, photo'). So app.children IS populated for P4 (non-parent member) and P5 (viewer); the Activities tab therefore surfaces auto-derived CHILD BIRTHDAY rows (child name + birthday month/day) in Celebrations AND child birthday markers in CalendarView, plus child names/photos in attendee facepiles / 'Who it's about' people cards — to non-parents. Only dev/health SUBcollections are parent-gated. Connections (P7) do NOT get the connected family's children (children docs not in the connection-readable set), so P7 sees shared trips/events/activities but never the other family's kids. Confirm this child name/DOB exposure to non-parent same-family members is the intended privacy posture.","Edit/Delete affordances (pencil on TripDetailSheet, 'Edit event'/'Edit activity' buttons) are shown to EVERY persona who can open the detail, including read-only viewers (P5) and connections (P7). For a connection viewing another family's shared trip, a write is rule-denied (isCairnMember scoped to the host family) but the UI still presents edit/delete — they'd fail on save. Consider read-only detail views (no edit affordance) for P5/P7.","The Activities tab has ZERO persona code-branches (verified by grep across Screens/Activities/ + all rendered Components) — unlike Home/Children/Settings which branch on viewerIsParent/viewerIsChildViewer. Confirm this is intentional: Activities is meant to be a fully shared flat-family surface where the only differences are data (visibleTo / children-read scoping), not UI. Cleanest area for the mockup, but the lack of any read-only treatment for P5 is notable.","Multiple user-facing strings contain em-dashes ('here — soonest first.' empty state; 'Tagging someone adds them automatically — never bumps...' trip hint; 'Tagging someone here is descriptive — it doesn't change...' event hint; 'Tap to include — events you confirm...' and 'We'll only read — and only the next 90 days' calendar import), violating the project no-em-dash rule (feedback_no_em_dashes.md). Likely pre-existing; flag for cleanup, out of scope for the mockup.","P6 (solo childless) and a fresh P4/P5/P7 most often see the empty state ('No upcoming adventures' + 'Plan a trip'/'Add event' CTAs), unless someone has shared an extended-visibility ('Everyone') trip/event with them. The realistic non-parent/childless Activities view for the mockup is usually empty."]},{"area":"settings-tab","items":["P5 (ReadOnlyViewer) is in family.childViewers, NOT necessarily memberIds — so whether they see a 'Co-parent' row in SettingsFamilyView.membersGroup depends on memberIds composition. Worth confirming with Thomas how a read-only viewer typically ends up in memberIds vs only childViewers.","The coParentRequestsGroup CLAIM face ('Are you {childName}'s parent?') in SettingsFamilyView depends on app.selectedChild != nil. For non-parent members (P4/P7) in a family WITH children, the children listener sets selectedChild from child-name stubs, so the claim row DOES surface in Settings — duplicating the 2A claim flow that also lives in the Children tab. Confirm this is intended (two entry points) or whether Settings should suppress it.","The Co-parent row in membersGroup hardcodes the subtitle 'Co-parent' for ANY other member in memberIds, even if that member is a non-parent. For a family where the second member is a non-parent (P4-style), this mislabels them. Flag for copy review.","SettingsMemoryView's hub row is visible to all personas, but the Anchors/Rhythms add (+) buttons and edit sheets are functionally write-gated by Firestore scope rules — a non-parent member (P4) tapping + may hit a silent rules rejection (surfaced via the 'Couldn't save' alert) for child-scoped facts. Worth confirming the intended non-parent memory-editing experience.","The 'Daily roles & routines' (usualRoutinesEntry) is the ONLY persona-gated item inside SettingsMemoryView (if app.viewerIsParent). Everything else in Memory (Anchors, Rhythms, Packing lists, Patterns, Live context) is ungated at the section level. Confirm this asymmetry is intended.","SettingsActivityLogView ('Admin Activity log') is reachable by ALL personas via Security, despite the 'Admin' label — there is no viewerIsParent guard. Confirm whether non-parent members / read-only viewers should see the family audit log.","P6 (SoloChildless) with zero children: selectedChild is nil, so the coParentRequestsGroup (both faces) is entirely absent from their Family screen. Their Family screen is effectively: hero + Members (self only) + Invite + Location + (no connected families). Confirmed correct but worth noting as the sparsest Family-screen variant.","P3 (CoParentJoiner) at the post-registration code level is identical to P1/P2 (all hit the viewerIsParent=true branch); the only differences are data (which/how many children they parent) and the onboarding path. No Settings-tab code branch distinguishes P3 from P1/P2."]}],"headlines":[{"tag":"STATUS","t":"<b>Status (2026-06-17):</b> iOS is fully shipped (Batches 1/2/4, P2/P3, Batch 3 Pebble-for-all). The <b>Portal-parity sprint is now also shipped and live</b>: activity author-gate (non-authors get a read-only view of trip-attached activities), co-parent label by real <code>parentIds</code>, family-circle legend, whole-family invite copy, the em-dash sweep, the “What Pebble knows” scope-segmented fix, and onboarding parity (a Location step, a Notifications explainer, and developmental-flags capture in Add-Child)."},{"tag":"RESOLVED","t":"<b>Portal parity (B + C) shipped:</b> trip-attached <code>/activities</code> Edit/Delete is author-only, so a non-author now opens a <b>read-only</b> sheet instead of a save that permission-denies; plus co-parent label, family-circle legend, whole-family invite copy, joiner own-photo step, and the user-facing em-dash sweep."},{"tag":"RESOLVED","t":"<b>Portal “What Pebble knows” fixed:</b> the four memory-layer listeners were bare collection queries the 2026-06-13 scope rules reject (silent permission-denied → blank). Rewritten to scope-segmented sub-queries (family / own-member / parented-child) merged client-side, mirroring iOS."},{"tag":"RESOLVED","t":"<b>Portal onboarding parity:</b> the web wizard now has a Location step (city/region/country + geolocate + skip), captures Premature + 7 areas-of-focus into <code>developmentalFlags</code>, and ends on a Notifications explainer. No web push exists, so the step points to the mobile app and deliberately never writes the iOS <code>notificationsOnboardingComplete</code> flag (which would suppress the on-device prompt)."},{"tag":"OPEN","t":"<b>Product decision:</b> ActivityForm’s “Who’s going” chips pull <code>app.children</code> directly, so a non-parent, viewer or connection can tag any family child as attending (Trip and Event forms don’t). It is consistent with the signed-off privacy posture (the ring already sees the children); the call is whether non-parents should be able to tag a child at all."},{"tag":"OPEN","t":"<b>Copy, low severity:</b> the quota-limit line “Both parents share the same 5-question pool” (<code>AdvisorView.limitReachedComposer</code>) is wrong for a solo parent, and for any non-parent now that Batch 3 reuses this composer. Fix: a family-framed rewrite, e.g. “your family shares the same 5-question pool.”"},{"tag":"OPEN","t":"<b>Gate gap, small:</b> the read-only viewer’s Growth Insights has two ungated refresh paths, the header Refresh button and the empty-state card, itself a button calling <code>refreshInsights()</code>. Only the 7-day cooldown guards them, not viewer role."},{"tag":"OPEN","t":"<b>Copy, low severity:</b> 7 user-facing range labels still use en-dashes instead of hyphens (milestone age ranges, trip date ranges), against the no-en-dash rule. Optional swap."},{"tag":"CONFIRMED","t":"<b>Privacy posture (signed off):</b> child name, DOB and photo are visible to every ring member, non-parent members and read-only viewers included, via the <code>/children</code> read rule (<code>isCairnMember</code>). Only milestones, dev and health subcollections are parent-gated. Kept as designed: the ring sees WHO the kids are."},{"tag":"MODEL","t":"P4 (non-parent member) and P6 (solo or childless) share ONE code branch (NonParentHome / nonParentChildren); they differ only by data, family has children vs none. There is no <code>Family.childCount</code> accessor, so the two are indistinguishable at runtime."},{"tag":"MODEL","t":"P7 (connected member) has NO persona branch at all, it renders as parent or non-parent per the user’s role in their OWN family. The connection is purely a data and visibility layer (Activities <code>visibleTo</code>); a connection never sees the other family’s children anywhere."},{"tag":"NOTE","t":"The “Milestone areas” DomainGrid is commented out in the parent Children tab (intentional, Milestones redesign); parents reach milestones via the Review-Milestones cover and the Growth Pathways timeline."},{"tag":"NOTE","t":"Three screens the first pass missed are folded in: <code>PathwaysTimelineView</code> (Growth Pathways timeline, parent-only), <code>CalendarFilterSheet</code> (calendar filters and tag rename or delete), <code>PackingTemplateEditView</code> (packing-template editor)."},{"tag":"RESOLVED","t":"<b>Non-parent Family Brief:</b> non-parent members and solo members now get their OWN child-dev-free Family Brief on Home (weather, shared extended-visibility activities/trips, and celebrations only), reusing the FamilyBriefHeroCard with its coordination footer hidden. It is a separate document (<code>nonParentDailyCards</code>) built from a context that allow-lists weather and filters trips/events to “extended” visibility, so no milestones, health, routines, coordination, or out-of-audience items can leak. iOS + Portal."},{"tag":"RESOLVED","t":"Pebble for all: a parent gets full child context, a non-parent gets a planning advisor with no child data."},{"tag":"RESOLVED","t":"Weekend planner payload scoped, a non-parent transmits no child data."},{"tag":"RESOLVED","t":"Family Brief hero made permanent (experiment flag removed)."},{"tag":"RESOLVED","t":"“Admin Activity log” renamed “Family activity log.”"},{"tag":"RESOLVED","t":"Co-parent settings row labels by real <code>parentIds</code>, not a hardcoded “Co-parent.”"},{"tag":"RESOLVED","t":"Per-child Request-access pills collapsed to one family-level “Request read-only access” button."},{"tag":"RESOLVED","t":"“What Pebble knows” Anchors and Rhythms add or edit are parent-gated; non-parents read-only."},{"tag":"RESOLVED","t":"Three HIGH family-framing leaks fixed (weekend planner, Family Circle legend, notifications), plus the invite-share copy."},{"tag":"RESOLVED","t":"Em-dash sweep across ~30 user-facing files."},{"tag":"RESOLVED","t":"Activity Edit and Delete resolved on iOS (Activities are collaborative; the one dead Edit on author-only items is hidden)."}]};

function avStack(names, size, cap){cap=cap||5; let h='<div class="avstack">'; const show=names.slice(0,cap); show.forEach(n=>h+=av(n,size)); if(names.length>cap) h+='<div class="av more" style="width:'+size+'px;height:'+size+'px;font-size:'+Math.round(size*.36)+'px">+'+(names.length-cap)+'</div>'; return h+'</div>';}

// Growth Pathways radar — the SIX developmental pathways (not the 4 milestone
// areas), a hexagon, clockwise from top: Reading / Movement / Reasoning /
// Independence (bottom) / Friendship / Writing. Per GrowthPathwaysRadar.swift +
// MilestoneArc+UI.swift (radarOrder + pathwayColor). Teal progress polygon shows
// the child's relative "growth shape"; frosted card + woven-timeline footer.
function pathwayRadar(){
  const cx=110, cy=92, R=60;
  const arcs=[
    {l:'Reading',      c:'#D4A843', d:'#b8902f', f:0.88, lx:110, ly:22,  a:'middle'},
    {l:'Movement',     c:'#6B9AC4', d:'#4f7ba6', f:0.64, lx:170, ly:58,  a:'start'},
    {l:'Reasoning',    c:'#8B7BB5', d:'#6f60a0', f:0.50, lx:170, ly:128, a:'start'},
    {l:'Independence', c:'#3D9B8F', d:'#1F5C54', f:0.58, lx:110, ly:170, a:'middle'},
    {l:'Friendship',   c:'#C98A8A', d:'#b06d6d', f:0.78, lx:50,  ly:128, a:'end'},
    {l:'Writing',      c:'#C67B5C', d:'#A8624A', f:0.42, lx:50,  ly:58,  a:'end'},
  ];
  const ang=(i)=>(-90+60*i)*Math.PI/180;
  const vx=(i,r)=>(cx+r*Math.cos(ang(i))).toFixed(1), vy=(i,r)=>(cy+r*Math.sin(ang(i))).toFixed(1);
  let grid='';
  [R, R*0.5].forEach(r=>{ const p=[]; for(let i=0;i<6;i++)p.push(vx(i,r)+','+vy(i,r)); grid+='<polygon points="'+p.join(' ')+'" fill="none" stroke="rgba(31,92,84,.12)" stroke-width="1"/>'; });
  for(let i=0;i<6;i++) grid+='<line x1="'+cx+'" y1="'+cy+'" x2="'+vx(i,R)+'" y2="'+vy(i,R)+'" stroke="rgba(31,92,84,.1)"/>';
  const poly=[]; for(let i=0;i<6;i++)poly.push(vx(i,R*arcs[i].f)+','+vy(i,R*arcs[i].f));
  const polygon='<polygon points="'+poly.join(' ')+'" fill="rgba(61,155,143,.18)" stroke="rgba(61,155,143,.72)" stroke-width="2.4" stroke-linejoin="round"/>';
  let dots='', labels='';
  arcs.forEach((x,i)=>{ dots+='<circle cx="'+vx(i,R*x.f)+'" cy="'+vy(i,R*x.f)+'" r="4.6" fill="'+x.c+'" stroke="#fff" stroke-width="1.8"/>';
    labels+='<text x="'+x.lx+'" y="'+x.ly+'" text-anchor="'+x.a+'" font-size="10.5" font-family="Inter" font-weight="700" fill="'+x.d+'">'+x.l+'</text>'; });
  const radar='<svg viewBox="-22 6 264 180" style="width:100%;height:auto;display:block">'+grid+polygon+dots+labels+'</svg>';
  const foot='<div class="pwfoot"><div class="wt"></div><div class="grow"><div class="pt">See the full timeline</div><div class="ps">Every pathway, woven over time</div></div><div style="color:var(--teal)">'+svg('chev')+'</div></div>';
  return '<div class="radarcard" style="padding:0;overflow:hidden;background:rgba(255,255,255,.78)"><div style="padding:13px 10px 4px">'+radar+'</div>'+foot+'</div>';
}
function domainGrid(){
  const d=[['Motor','#6B9AC4','12 of 18'],['Language','#D4A843','9 of 14'],['Social','#C98A8A','7 of 12'],['Cognitive','#8B7BB5','10 of 15']];
  return '<div class="dgrid">'+d.map(x=>'<div class="dtile" style="background:linear-gradient(150deg,'+x[1]+',rgba(0,0,0,.12))"><div class="dn">'+x[0]+'</div><div class="dc">'+x[2]+'</div></div>').join('')+'</div>';

  const id=state.persona;

/* ───────────────────────── phone shells ───────────────────────── */
function obPhone(stepNo, label, innerHTML){
  const wrap=el('div','phonewrap');
  wrap.appendChild(el('div','stepno', String(stepNo)));
  const ph=el('div','phone'); ph.appendChild(el('div','notch'));
  const sc=el('div','screen'); sc.innerHTML=statusbar()+innerHTML;
  ph.appendChild(sc); wrap.appendChild(ph);
  wrap.appendChild(el('div','steplbl', esc(label)));
  return wrap;
}
function appPhone(P){
  const wrap=el('div','phonewrap');
  const ph=el('div','phone lg'); ph.appendChild(el('div','notch'));
  const sc=el('div','screen');
  sc.innerHTML=appScreenContent(P);
  sc.appendChild(tabbar(P));
  ph.appendChild(sc); wrap.appendChild(ph);
  return wrap;
}

/* ───────────────────────── views ───────────────────────── */
// Null-safe no-ops: the stageHead + caption elements were removed from <main>;
// every render fn still calls these, so they simply do nothing when the
// targets are absent. Re-add the divs in <main> to bring the block back.
function setHead(txt, pill){const h=document.getElementById('stageHead'); if(!h) return; h.innerHTML=''; h.appendChild(document.createTextNode(txt)); if(pill)h.appendChild(el('span','pill',pill));}
function setCap(html){const c=document.getElementById('cap'); if(!c) return; c.innerHTML=html||'';}

// Large single onboarding iPhone (the hero) — no step badge/label
// (the stepper above carries the labels), no tab bar.
function obPhoneLarge(innerHTML){
  const ph=el('div','phone lg'); ph.appendChild(el('div','notch'));
  const sc=el('div','screen'); sc.innerHTML=statusbar()+innerHTML;
  ph.appendChild(sc);
  return ph;
}
// Portal onboarding hero — the desktop browser frame; the dusk obbg
// fills the wide viewport, the obcard is width-constrained + centered
// (see .pw-obapp CSS), so the same screen markup reads as the web wizard.
function portalObFrame(innerHTML){
  const frame=el('div','pw-browser');
  frame.innerHTML='<div class="pw-chrome"><div class="pw-dots"><span></span><span></span><span></span></div><div class="pw-url">pebblepath.ai/portal</div></div>'
    +'<div class="pw-app pw-obapp">'+innerHTML+'</div>';
  return frame;
}
function renderOnboarding(){
  const P=M();
  const ios = state.platform==='ios';
  const seq = ios ? obSequence(P) : portalObSequence(P);
  if(state.obStep>=seq.length) state.obStep=seq.length-1;
  if(state.obStep<0) state.obStep=0;
  const step=state.obStep;
  setHead('Registration · '+persona().name+' · '+(ios?'iPhone':'Desktop'), 'Step '+(step+1)+' of '+seq.length);
  let cap='';

    + '<section class="pw-grid2"><div class="pw-col">'+pNextTrip(P)+pUpcomingPanel(P)+'</div>'
    + '<div class="pw-col">'+pChildCardHome(P)+pInsightsPanelHome(P)+'</div></section>'

}
function pChildHero(P){
  const k=P.kids[0];
  return '<div class="pw-childhero" style="--ktint:'+kidTint(k.name)+'"><div class="row" style="gap:14px;align-items:center">'+av(k.name,64)+'<div class="grow"><div class="nm" style="font-size:22px">'+esc(k.name)+'</div><div style="opacity:.9;font-size:12px">'+esc(k.age)+'</div><span class="pw-agepill">'+(k.done||0)+' of '+(k.total||0)+' milestones achieved</span></div><div style="text-align:right"><div class="pct">'+k.pct+'%</div><div style="font-size:10px;opacity:.85">of tracked milestones</div></div></div></div>';

function pMilestoneRows(kind){

}
function pGrowthInsightsCol(P){
  const k=P.kids[0];
  return '<div class="pw-sect">Growth insights</div><div class="pw-ins"><div class="pw-ins-t" style="color:var(--lang)">Language is ahead of pace</div><div class="pw-cs">'+esc(k.name)+' is combining 3-4 word phrases earlier than most.</div></div>'
    +'<div class="pw-ins" style="margin-top:10px"><div class="pw-ins-t" style="color:var(--social)">Worth watching: sharing</div><div class="pw-cs">Turn-taking is still emerging. Short board games help.</div></div>';
}
function pChildGate(P){
  if(P.solo || !P.kids.length){
    return '<div class="pw-card pw-gate"><div class="pw-gate-ic">'+svg('users')+'</div><div class="pw-gate-t">This area is private to parents</div><div class="pw-gate-s">Children’s milestones, growth insights and Pebble are visible only to parents on a PebblePath household, never to the extended circle. If you’re a parent here and don’t see your child, make sure you’re signed in with your PebblePath account.</div><div class="pw-gate-cta"><span class="pw-pill ghost">Back to Activities</span></div></div>';
  }

    +'<div class="pw-card pw-claim"><div class="pw-claim-t">Are you a parent or caregiver of one of them?</div><div class="pw-claim-s">Claim the link, an existing parent confirms it. You’ll get the full child experience once approved.</div>'+claims+'</div>';

function pChildren(P){
  if(P.branch==='parent' || P.branch==='viewer'){
    const viewer=P.branch==='viewer'; const k=P.kids[0];
    const header = viewer
      ? pHeader('Children','Milestones &amp; growth insights — read-only, shared by the parents', pScopeChip('Shared with you · read-only','eye'))

      : '<div class="pw-card pw-pedcta" style="margin-top:16px"><span class="si" style="color:var(--teal-deep)">'+svg('flier')+'</span><div class="grow"><div class="st">Pediatrician summary</div><div class="ss">A clinician-ready summary of '+esc(k.name)+'’s milestone history, written by Pebble. Bring it to your next check-up.</div></div><span class="pw-pill teal">Generate summary</span></div>';
    return header + pChildHero(P)
      + '<div class="pw-sect" style="margin-top:16px">Growth Pathways <span class="lnk">See all</span></div>' + pathwayRadar()
      + '<section class="pw-grid2" style="margin-top:14px"><div class="pw-col"><div class="pw-sect">Coming up</div><div class="pw-card">'+pMilestoneRows('coming')+'</div><div class="pw-sect" style="margin-top:14px">Recently achieved</div><div class="pw-card">'+pMilestoneRows('recent')+'</div></div>'
      + '<div class="pw-col">'+pGrowthInsightsCol(P)+'</div></section>'
      + closing + pDrift('children',P);
  }
  // non-parent / solo — the private-to-parents gate.
  return pHeader('Children','Milestones and insights', pScopeChip('Private to parents','lock')) + pChildGate(P) + pDrift('children',P);
}
function pPebble(P){
  const q=pQuota(P);
  // Parents AND read-only viewers get the child advisor; non-parent/solo get the family planning advisor.
  if(P.branch==='parent' || P.branch==='viewer'){
    const k=P.kids[0]?.name||'your child';
    return '<div class="pw-peb">'
      +'<div class="pw-pebrail"><div class="rh">Chats</div><button class="pw-railitem newchat">'+svg('plus')+' New chat</button><div class="pw-railitem on">Is '+esc(k)+' saying enough words…</div><div class="pw-railitem">Rainy weekend ideas</div><div class="pw-railitem">Sleep regression help</div></div>'
      +'<div class="pw-pebmain"><div class="pw-pebtop"><span></span><div class="pw-pebtop-r"><div class="pw-quota '+(q.unl?'unl':'')+'">'+esc(q.t)+'</div><span class="pw-seg sm"><span class="on">'+svg('users')+' Family</span><span>'+svg('lock')+' Private</span></span></div></div>'
      +'<div class="pw-pebbubbles"><div class="pw-bub you">Is '+esc(k)+' saying enough words for his age?</div><div class="pw-bub pb">At 3, most children use 200+ words and short phrases. From your logs, '+esc(k)+' is right on track. A few ways to keep building…</div></div>'
      +'<div class="pw-pebcomposer"><div class="field">Ask Pebble anything…</div><div class="send">'+svg('send')+'</div></div></div></div>'
      + pDrift('pebble',P);
  }
  return '<div class="pw-peb" style="flex-direction:column">'
    +'<div class="pw-pebtop"><div class="pw-quota '+(q.unl?'unl':'')+'">'+esc(q.t)+'</div><span></span></div>'
    +'<div class="pw-pebland"><div class="pw-stone"></div><div class="pw-pebgreet"><div class="l1">Hi '+esc(P.first)+',</div><div class="l2">what can I help your family plan?</div></div>'
      +'<div class="pw-pebcards">'
      +'<div class="pw-pebc"><div class="pg" style="background:var(--terra)">'+svg('flier')+'</div><div class="pt">Smart Upload</div><div class="ps">Drop a flier, schedule or note. I’ll pull out the dates.</div></div>'
      +'<div class="pw-pebc"><div class="pg" style="background:var(--teal)">'+svg('sun')+'</div><div class="pt">Weekend ideas</div><div class="ps">Things for your family to do nearby.</div></div>'
      +'<div class="pw-pebc"><div class="pg" style="background:var(--teal-deep)">'+svg('mic')+'</div><div class="pt">Speak directly</div><div class="ps">Hands full? Just talk, I’m listening.</div></div>'
      +'</div></div>'
    +'<div class="pw-pebcomposer"><div class="field">Ask about plans, activities, logistics…</div><div class="send">'+svg('send')+'</div></div></div>'
    + pDrift('pebble',P);

function pCalendarWorkspace(){
  const dows=['SUN','MON','TUE','WED','THU','FRI','SAT'], days=['14','15','16','17','18','19','20'];
  const grid='<div class="pw-cal-grid">'+dows.map((d,i)=>'<div class="pw-cal-col"><div class="pw-cal-dow">'+d+'<b>'+days[i]+'</b></div>'+(i===2?'<div class="pw-cal-ev" style="background:var(--teal)">Splash day</div>':'')+(i===6?'<div class="pw-cal-ev" style="background:var(--terra)">New Buffalo →</div>':'')+'</div>').join('')+'</div>';
  const filters=[['Trips','var(--teal)','2'],['Holidays','var(--lang)','3'],['Activities','var(--motor)','5'],['Celebrations','var(--social)','1']];
  const side='<div class="pw-cal-side"><div class="pw-minimonth">June 2026</div><div class="pw-cal-fh">Calendars</div>'+filters.map(f=>'<div class="pw-cal-f"><span class="pw-cal-dot" style="background:'+f[1]+'"></span>'+f[0]+'<span class="pw-cal-n">'+f[2]+'</span></div>').join('')+'</div>';
  const tb='<div class="pw-cal-tb"><span class="pw-pill ghost">Today</span><span class="pw-cal-nav">‹ <b>Jun 14 – 20</b> ›</span><span class="pw-cal-views"><span class="on">Week</span><span>Month</span><span>Year</span></span><span class="pw-add">'+svg('plus')+'</span></div>';
  return '<div class="pw-card pw-cal">'+tb+'<div class="pw-cal-body">'+side+grid+'</div></div>';
}
function pActivities(P){
  const up=upcomingFor(P); const trip=up[0];
  const comingBody = P.solo
    ? '<div class="pw-emptyhero"><div class="pw-eh-t">Let’s plan something fun.</div><div class="pw-eh-s">Plan a trip, weekend, or outing, or pull what’s already in your Google Calendar.</div><div class="pw-eh-cta"><span class="pw-pill terra">'+svg('plus')+'New activity</span><span class="pw-pill ghost">Import from Google Calendar</span></div></div>'
    : '<div class="pw-trips-row"><div class="pw-trip"><span class="pw-pill" style="background:rgba(0,0,0,.34);color:#fff;align-self:flex-start">JUN 20 - 23</span><div class="tt" style="margin-top:auto">'+esc(trip.t)+'</div><div class="pw-nt-s">'+svg('mappin')+'New Buffalo, MI'+(trip.shared?' · shared by '+esc(trip.shared):'')+'</div></div>'
      + laterTripsFor(P).slice(0,1).map(t=>'<div class="pw-trip" style="background:'+t.bg+'"><span class="pw-pill" style="background:rgba(0,0,0,.3);color:#fff;align-self:flex-start">'+esc(t.date)+'</span><div class="tt" style="margin-top:auto;font-size:18px">'+esc(t.t)+'</div><div class="pw-nt-s">'+svg('mappin')+esc(t.loc)+'</div></div>').join('')+'</div>';
  const head='<div class="pw-sect">Coming up <span class="pw-secthd-acts"><span class="pw-pill teal">'+svg('pebble')+'Plan our weekend</span><span class="pw-pill ghost">'+svg('flier')+'Smart Upload</span></span></div>';
  return pHeader('Activities', esc(P.family), pScopeChip('Shared with connections'))
    + head + comingBody + pCalendarWorkspace() + pCelebrations(P) + pDrift('activities',P);
}
function pCircleRing(){
  const c=CIRCLE[state.persona]||CIRCLE.P1; const cx=148,cy=126,rF=58,rC=104;
  const node=(m,deg,r)=>{const a=deg*Math.PI/180,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);return '<div class="pw-rn'+(m.child?' child':'')+'" style="left:'+x.toFixed(0)+'px;top:'+y.toFixed(0)+'px">'+av(m.n,32)+'<div class="pw-rnl">'+esc(m.n)+'</div></div>';};
  let r='<div class="pw-ring"><div class="pw-rg" style="width:'+(rC*2)+'px;height:'+(rC*2)+'px"></div><div class="pw-rg" style="width:'+(rF*2)+'px;height:'+(rF*2)+'px"></div>';
  if(c.justYou){ r+='<div class="pw-rn you" style="left:'+cx+'px;top:'+cy+'px">'+av(c.you,40)+'<div class="pw-rnl">'+esc(c.you)+'</div></div>'; }
  else {
    const inner=c.inner||[], outer=c.outer||[];
    inner.forEach((m,i)=>r+=node(m,-90+i*(360/Math.max(inner.length,1)),rF));
    outer.forEach((m,i)=>r+=node(m,-90+(180/Math.max(outer.length,1))+i*(360/Math.max(outer.length,1)),rC));
    r+='<div class="pw-rn you" style="left:'+cx+'px;top:'+cy+'px">'+av(c.you,40)+'<div class="pw-rnl">'+esc(c.you)+'</div></div>';
  }
  return r+'</div>';
}
function pLevels(){
  const rows=[['You','Your account, your perspective.','You','var(--motor)'],['Your family','Your co-parent and your children.','Full access','var(--teal-deep)'],['Your connections','Everyone who joined by invitation.','Activities only','var(--terra)']];
  return '<div class="pw-card pad0">'+rows.map(x=>'<div class="pw-srow"><span class="pw-lvl-dot" style="background:'+x[3]+'"></span><div class="grow"><div class="st">'+x[0]+'</div><div class="ss">'+x[1]+'</div></div><span class="pw-pill ghost" style="border-color:'+x[3]+';color:'+x[3]+'">'+x[2]+'</span></div>').join('')+'</div>';
}
function pChildAccess(P){
  if(P.branch!=='parent' || P.family!=='The Paris Family') return '';
  return '<div class="pw-sect" style="margin-top:18px">Child-view access <span class="pw-secthd-note">Read-only — milestones &amp; insights, never Pebble or editing</span></div>'
    +'<div class="pw-card pad0"><div class="pw-srow"><span class="si" style="color:var(--terra)">'+svg('users')+'</span><div class="grow"><div class="st">Laurine</div><div class="ss">Read-only Children access</div></div><span class="lnk">Revoke</span></div></div>';
}
function pAccount(P){
  let rows='<div class="pw-srow"><span class="si">'+svg('users')+'</span><div class="grow"><div class="st">Profile Settings</div><div class="ss">Your photo, display name, sign out.</div></div><span class="lnk">Edit</span></div>';
  rows+='<div class="pw-srow"><span class="si">'+svg('shield')+'</span><div class="grow"><div class="st">'+esc(P.family)+'</div><div class="ss">Family name &amp; invite codes</div></div><span class="lnk">Manage</span></div>';
  rows+='<div class="pw-srow"><span class="si">'+svg('swatch')+'</span><div class="grow"><div class="st">Appearance</div><div class="ss">Applies across the Portal.</div></div><span class="pw-seg sm"><span class="on">Light</span><span>Dark</span></span></div>';
  rows+='<div class="pw-srow"><span class="si" style="color:var(--terra)">'+svg('crown')+'</span><div class="grow"><div class="st">PebblePath Premium</div><div class="ss">Unlimited Pebble, summaries, and insights.</div></div><span class="ss" style="font-style:italic;white-space:nowrap">Managed in the app</span></div>';
  if(P.branch==='parent') rows+='<div class="pw-srow"><span class="si">'+svg('brain')+'</span><div class="grow"><div class="st">What Pebble knows</div><div class="ss">The memory Pebble keeps about your family.</div></div><span class="lnk">View</span></div>';
  rows+='<div class="pw-srow"><span class="si">'+svg('plus')+'</span><div class="grow"><div class="st">Join another family</div><div class="ss">Paste a 6-character connect code.</div></div><span class="pw-join"><span class="pw-codein">ABC123</span><span class="pw-pill teal">Join</span></span></div>';
  return '<div class="pw-sect" style="margin-top:18px">Account</div><div class="pw-card pad0">'+rows+'</div>';
}
function pSettings(P){
  return pHeader('Settings', 'Who’s in your circle, and what each level can see')
    + '<section class="pw-grid2"><div class="pw-col"><div class="pw-sect">Your Circles <span class="lnk">Manage members</span></div><div class="pw-card">'+pCircleRing()+'</div></div>'
    + '<div class="pw-col"><div class="pw-sect">What each level sees</div>'+pLevels()+'</div></section>'
    + pChildAccess(P) + pAccount(P) + pDrift('settings',P);
}
function renderPortal(){
  const P=M();
  setHead('Portal (web) · '+persona().name, persona().label);
  setCap('The same account on the <b>web Portal</b> (pebblepath.ai/portal). Tap the <b>nav tabs</b> to move around. Built to mirror the live Portal; each tab notes how it lines up with iOS. This renders the <b>'+P.branch+'</b> branch.');
  let content;
  if(state.appTab==='home') content=pHome(P);
  else if(state.appTab==='children') content=pChildren(P);
  else if(state.appTab==='pebble') content=pPebble(P);
  else if(state.appTab==='activities') content=pActivities(P);
  else content=pSettings(P);
  const stage=document.getElementById('stage'); stage.innerHTML='';
  const frame=el('div','pw-browser');
  frame.innerHTML='<div class="pw-chrome"><div class="pw-dots"><span></span><span></span><span></span></div><div class="pw-url">pebblepath.ai/portal</div></div>'
    +'<div class="pw-app">'+pTopbar(P)+'<div class="pw-main">'+content+'</div></div>';
  frame.querySelectorAll('[data-ptab]').forEach(e=>{ e.onclick=()=>{ state.appTab=e.dataset.ptab; render(); }; });
  stage.appendChild(frame);
}

// Reflect the active state onto the Stage / Platform / More chips. When
// an auxiliary view is open, Stage + Platform read inactive.
function reflectChips(){
  document.querySelectorAll('#stageChips .chip').forEach(c=>c.classList.toggle('on', !state.aux && c.dataset.stage===state.stage));
  document.querySelectorAll('#platformChips .chip').forEach(c=>c.classList.toggle('on', !state.aux && c.dataset.platform===state.platform));
  document.querySelectorAll('#auxChips .chip').forEach(c=>c.classList.toggle('on', c.dataset.aux===state.aux));
}
function render(){
  // #10 — the persona description moved to a hover tooltip on each persona
  // chip (built in buildChips); the always-visible personaCard banner is gone.
  reflectChips();
  if(state.aux==='circle') return renderCircle();
  if(state.aux==='matrix') return renderMatrix();
  if(state.aux==='findings') return renderFindings();
  if(state.stage==='onboarding') return renderOnboarding();
  // In the app: the platform toggle picks the device.
  if(state.platform==='portal') return renderPortal();
  return renderApp();
}

/* ───────────────────────── wire ───────────────────────── */
const D=window.DATA;
const state={persona:'P1', stage:'onboarding', platform:'ios', appTab:'home', obStep:0, aux:null};
function buildChips(){
  const pc=document.getElementById('personaChips');
  D.personas.forEach(p=>{
    const b=el('button','chip persona'+(p.id===state.persona?' on':''),
      '<span class="pn">'+esc(p.name)+'</span><span class="pr">'+p.id+' · '+esc(p.short)+'</span>'
      +'<span class="ptip"><span class="pt-h">'+esc(p.name)+' <span class="branchTag b-'+p.branch+'">'+esc(p.branch)+' branch</span></span><span class="pt-d">'+esc(p.desc)+'</span></span>');
    b.onclick=()=>{state.persona=p.id; state.appTab='home'; state.obStep=0; document.querySelectorAll('#personaChips .chip').forEach(c=>c.classList.remove('on')); b.classList.add('on'); render();};
    pc.appendChild(b);
  });
  document.querySelectorAll('#stageChips .chip').forEach(b=>{b.onclick=()=>{state.stage=b.dataset.stage; state.aux=null; state.obStep=0; state.appTab='home'; render();};});
  document.querySelectorAll('#platformChips .chip').forEach(b=>{b.onclick=()=>{state.platform=b.dataset.platform; state.aux=null; state.obStep=0; render();};});
  document.querySelectorAll('#auxChips .chip').forEach(b=>{b.onclick=()=>{state.aux=b.dataset.aux; render();};});
}
buildChips(); render();
</script>
