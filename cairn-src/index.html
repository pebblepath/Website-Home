<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f5c54" />
    <meta name="color-scheme" content="dark light" />

    <title>Portal — for every little adventure</title>
    <meta
      name="description"
      content="Private portal for your trips, activities, birthdays and anniversaries — for your whole family."
    />
    <link rel="canonical" href="https://pebblepath.ai/portal/" />

    <!-- Favicons. PNG primary (matches the topbar icon) + SVG fallback. -->
    <link rel="icon" type="image/png" sizes="256x256" href="assets/cairn-icon.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="assets/cairn-icon-2x.png" />
    <meta name="apple-mobile-web-app-title" content="Portal" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord, iMessage). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Portal" />
    <meta property="og:title" content="Portal — for every little adventure" />
    <meta
      property="og:description"
      content="Private portal for your trips, activities, birthdays and anniversaries — for your whole family."
    />
    <meta property="og:url" content="https://pebblepath.ai/portal/" />
    <meta property="og:image" content="https://pebblepath.ai/portal/og-card.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Portal — for every little adventure" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Portal — for every little adventure" />
    <meta
      name="twitter:description"
      content="Private portal for your trips, activities, birthdays and anniversaries — for your whole family."
    />
    <meta name="twitter:image" content="https://pebblepath.ai/portal/og-card.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/tokens.css" />
  </head>
  <body>
    <cairn-app></cairn-app>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
