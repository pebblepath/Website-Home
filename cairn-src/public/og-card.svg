<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#14403a"/>
      <stop offset="0.22" stop-color="#1f5c54"/>
      <stop offset="0.55" stop-color="#4a3a30"/>
      <stop offset="0.82" stop-color="#8b5a3e"/>
      <stop offset="1"    stop-color="#c67b5c"/>
    </linearGradient>
    <radialGradient id="og-glow-sage" cx="0.15" cy="0.2" r="0.5">
      <stop offset="0" stop-color="rgba(61,155,143,0.45)"/>
      <stop offset="1" stop-color="rgba(61,155,143,0)"/>
    </radialGradient>
    <radialGradient id="og-glow-amber" cx="0.85" cy="0.7" r="0.45">
      <stop offset="0" stop-color="rgba(212,168,67,0.35)"/>
      <stop offset="1" stop-color="rgba(212,168,67,0)"/>
    </radialGradient>
    <linearGradient id="og-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0e3cf"/>
      <stop offset="0.6" stop-color="#c9b89a"/>
      <stop offset="1" stop-color="#8b5a3e"/>
    </linearGradient>
    <linearGradient id="og-clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d99a7a"/>
      <stop offset="1" stop-color="#8b5a3e"/>
    </linearGradient>
    <linearGradient id="og-sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aebfa6"/>
      <stop offset="1" stop-color="#1f5c54"/>
    </linearGradient>
  </defs>

  <!-- Dusk gradient + mesh glows -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow-sage)"/>
  <rect width="1200" height="630" fill="url(#og-glow-amber)"/>

  <!-- Cairn of stones, left -->
  <g transform="translate(220 145)">
    <ellipse cx="0"   cy="320" rx="110" ry="34" fill="url(#og-warm)" opacity="0.96"/>
    <ellipse cx="-12" cy="248" rx="86"  ry="30" fill="url(#og-clay)" opacity="0.96"/>
    <ellipse cx="22"  cy="180" rx="68"  ry="26" fill="url(#og-sage)" opacity="0.96"/>
    <ellipse cx="-4"  cy="120" rx="48"  ry="20" fill="url(#og-warm)" opacity="0.96"/>
    <ellipse cx="12"  cy="70"  rx="32"  ry="15" fill="url(#og-clay)" opacity="0.96"/>
  </g>

  <!-- Wordmark + copy, right. Uses system-safe fallbacks because social
       platforms don't load custom @font-face from the page. The
       in-app Ponari render still works for users in the browser. -->
  <g fill="#fff8eb">
    <text x="480" y="290"
          font-family="Bricolage Grotesque, Georgia, serif"
          font-weight="700"
          font-size="160"
          letter-spacing="-2">Portal</text>
    <text x="480" y="350"
          font-family="Nunito, system-ui, -apple-system, sans-serif"
          font-weight="600"
          font-size="34"
          opacity="0.86">Where your family gathers</text>
    <text x="480" y="430"
          font-family="Inter, system-ui, sans-serif"
          font-weight="400"
          font-size="24"
          opacity="0.7">A private shared space for trips, birthdays,</text>
    <text x="480" y="463"
          font-family="Inter, system-ui, sans-serif"
          font-weight="400"
          font-size="24"
          opacity="0.7">and anniversaries — across your family.</text>
    <text x="480" y="540"
          font-family="Inter, system-ui, sans-serif"
          font-weight="500"
          font-size="20"
          opacity="0.55"
          letter-spacing="1.5">PEBBLEPATH.AI/CAIRN</text>
  </g>
</svg>
